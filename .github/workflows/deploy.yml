name: Lupine Science CI / Cloudflare Pages

on:
  pull_request:
    paths:
      - 'public/**'
      - 'docs/**'
      - 'scripts/**'
      - 'package.json'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
  push:
    paths:
      - 'public/**'
      - 'docs/**'
      - 'scripts/**'
      - 'package.json'
      - 'wrangler.toml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: lupine-science-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CF_PAGES_PROJECT: lupine-science

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # sitemap lastmod dates come from git history

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install build tooling
        run: npm ci

      - name: Build must be deterministic (committed output = sources)
        run: |
          npm run build
          git diff --exit-code || { echo "::error::committed output is stale — run 'npm run build' and commit"; exit 1; }

      - name: Verify static surface + performance budget
        run: npm run verify

      - name: Explain failure in run summary
        if: failure()
        run: |
          {
            echo "## Verify failed — first-line diagnosis"
            echo ""
            echo "**Rebuild drift (empty = not the problem):**"
            echo '```'
            git diff --stat
            echo '```'
            echo "**Verifier output tail:**"
            echo '```'
            npm run verify 2>&1 | tail -40
            echo '```'
            echo "_If drift is non-empty: run \`npm run build\` locally and commit. If the verifier lists \`[error]\`/\`[over]\` lines, those are the exact failures._"
          } >> "$GITHUB_STEP_SUMMARY" || true

  lighthouse:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Lighthouse CI (scores gate the deploy)
        run: npx --yes @lhci/cli@0.15.x autorun --config=lighthouserc.json

      - name: Explain failure in run summary
        if: failure()
        run: |
          {
            echo "## Lighthouse gate failed"
            echo '```json'
            cat .lighthouseci/assertion-results.json 2>/dev/null | head -c 4000 || echo "no assertion results file"
            echo ""
            echo '```'
            echo "_Reproduce locally: \`npx @lhci/cli autorun --config=lighthouserc.json\` (CHROME_PATH may be needed). Report links are in the step log above._"
          } >> "$GITHUB_STEP_SUMMARY" || true

  deploy-preview:
    needs: [verify, lighthouse]
    if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref_name != 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify static surface
        run: npm run verify

      - name: Validate Cloudflare secrets
        run: |
          miss=0
          [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && { echo "::error::MISSING SECRET: CLOUDFLARE_API_TOKEN"; miss=1; }
          [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ] && { echo "::error::MISSING SECRET: CLOUDFLARE_ACCOUNT_ID"; miss=1; }
          exit $miss

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          branch="${GITHUB_HEAD_REF:-$GITHUB_REF_NAME}"
          log_file="$(mktemp)"
          npx --yes wrangler@latest pages deploy public \
            --project-name "$CF_PAGES_PROJECT" \
            --branch "$branch" \
            --commit-hash "$GITHUB_SHA" \
            --commit-dirty=true | tee "$log_file"
          url="$(grep -Eo 'https://[^[:space:]]+\.pages\.dev' "$log_file" | tail -n 1)"
          [ -n "$url" ] || { echo "::error::Could not find Pages deployment URL"; exit 1; }
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Smoke test
        run: |
          url="${{ steps.deploy.outputs.url }}"
          echo "Smoke-testing $url"
          for i in 1 2 3 4 5; do
            health=$(curl -s --fail "$url/health" -m 10 || true)
            body=$(curl -s --fail "$url" -m 10 || true)
            if [ "$health" = "ok" ] && echo "$body" | grep -q "Evidence before claim"; then
              echo "Smoke test passed"
              exit 0
            fi
            echo "Attempt $i: content not ready, retrying..."
            sleep 10
          done
          echo "::error::Smoke test failed: expected content not found"
          exit 1

      - name: Show output
        run: echo "${{ steps.deploy.outputs.url }}"

  deploy-production:
    needs: [verify, lighthouse]
    if: (github.event_name == 'push' && github.ref_name == 'main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify static surface
        run: npm run verify

      - name: Validate Cloudflare secrets
        run: |
          miss=0
          [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] && { echo "::error::MISSING SECRET: CLOUDFLARE_API_TOKEN"; miss=1; }
          [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ] && { echo "::error::MISSING SECRET: CLOUDFLARE_ACCOUNT_ID"; miss=1; }
          exit $miss

      - name: Deploy production to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          log_file="$(mktemp)"
          npx --yes wrangler@latest pages deploy public \
            --project-name "$CF_PAGES_PROJECT" \
            --branch main \
            --commit-hash "$GITHUB_SHA" \
            --commit-dirty=true | tee "$log_file"
          url="$(grep -Eo 'https://[^[:space:]]+\.pages\.dev' "$log_file" | tail -n 1)"
          [ -n "$url" ] || { echo "::error::Could not find Pages deployment URL"; exit 1; }
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Smoke test deployment URL
        run: |
          url="${{ steps.deploy.outputs.url }}"
          echo "Smoke-testing $url"
          for i in 1 2 3 4 5; do
            health=$(curl -s --fail "$url/health" -m 10 || true)
            body=$(curl -s --fail "$url" -m 10 || true)
            if [ "$health" = "ok" ] && echo "$body" | grep -q "Evidence before claim"; then
              echo "Smoke test passed"
              exit 0
            fi
            echo "Attempt $i: content not ready, retrying..."
            sleep 10
          done
          echo "::error::Smoke test failed: expected health and content not found"
          exit 1

      - name: Smoke test custom domain
        run: |
          for i in 1 2 3 4 5; do
            health=$(curl -s --fail https://lupine.science/health -m 10 || true)
            body=$(curl -s --fail https://lupine.science/ -m 10 || true)
            if [ "$health" = "ok" ] && echo "$body" | grep -q "Evidence before claim"; then
              echo "Custom domain smoke test passed"
              exit 0
            fi
            echo "Attempt $i: custom domain not ready, retrying..."
            sleep 10
          done
          echo "::error::Custom domain smoke test failed"
          exit 1

      - name: Security headers are live
        run: |
          # the custom domain can lag the deployment by a few seconds while
          # Pages cuts over — retry like the other smoke tests
          for i in 1 2 3 4 5; do
            hdrs=$(curl -sI https://lupine.science/ -m 10 || true)
            if echo "$hdrs" | grep -qi "content-security-policy" && echo "$hdrs" | grep -qi "strict-transport-security"; then
              echo "Security headers verified"
              exit 0
            fi
            echo "Attempt $i: headers not visible yet, retrying..."
            sleep 10
          done
          echo "::error::CSP/HSTS headers missing on production after retries"
          exit 1

      - name: Show output
        run: echo "${{ steps.deploy.outputs.url }}"

      - name: Report deploy status
        if: always()
        run: |
          curl -X POST https://glim-think-v1.aw-ab5.workers.dev/ops/report \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"$GITHUB_REPOSITORY\",\"workflow\":\"$GITHUB_WORKFLOW\",\"run_id\":\"$GITHUB_RUN_ID\",\"status\":\"${{ job.status }}\",\"commit_sha\":\"$GITHUB_SHA\",\"branch\":\"$GITHUB_REF_NAME\",\"service\":\"lupine.science\",\"platform\":\"cloudflare-pages\",\"run_url\":\"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\",\"started_at\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" || true
