name: CI

on:
  push:
  pull_request:

concurrency:
  group: lupine-science-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint source
        run: npm run lint

      - name: Report lint failure
        if: failure()
        run: echo '### Lint failed — run `npm run lint` locally.' >> "$GITHUB_STEP_SUMMARY"

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Report type-check failure
        if: failure()
        run: echo '### Type check failed — run `npm run typecheck` locally.' >> "$GITHUB_STEP_SUMMARY"

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install system PDF/QA tools
        run: sudo apt-get update && sudo apt-get install --yes poppler-utils

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Build site
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Report unit-test failure
        if: failure()
        run: echo '### Unit tests failed — run `npm test` locally.' >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build site
    needs: [lint, typecheck, unit-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # sitemap lastmod dates come from git history

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install chrome-headless-shell for HyperFrames checks
        run: |
          npx @puppeteer/browsers install chrome-headless-shell | tee /tmp/chrome-install.log
          CHROME_PATH="$(grep -o '/[^ ]*/chrome-headless-shell[^ ]*' /tmp/chrome-install.log | head -1)"
          echo "HYPERFRAMES_BROWSER_PATH=${CHROME_PATH}" >> "$GITHUB_ENV"

      - name: Check article-video compositions
        working-directory: media/projects/article-videos
        env:
          HYPERFRAMES_BROWSER_PATH: ${{ env.HYPERFRAMES_BROWSER_PATH }}
        timeout-minutes: 8
        run: npm run check

      - name: Install system PDF/QA tools before tests
        run: sudo apt-get update && sudo apt-get install --yes poppler-utils

      - name: Install Playwright browsers for proof-pack tests and PDF rendering
        run: npx playwright install chromium

      - name: Build site
        run: npm run build

      - name: Verify static files, article images, and performance budget
        run: npm run verify

      - name: Generate proof pack
        run: npm run proofpack

      - name: Verify generated PDF
        run: npm run pdf:check

      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: lupine-science-public-${{ github.sha }}
          path: public/
          if-no-files-found: error
          retention-days: 14

  video-review:
    name: Smart video review
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install ffmpeg for technical/frame checks
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg

      - name: Download built site artifact
        uses: actions/download-artifact@v4
        with:
          name: lupine-science-public-${{ github.sha }}
          path: public/

      - name: Run smart video reviewer
        run: npm run review:videos -- --min-score 85

      - name: Upload video review report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: video-review-report-${{ github.sha }}
          path: media/projects/video-review/reports/
          if-no-files-found: ignore
          retention-days: 14

  visual-regression:
    name: Article-video component visual regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install chrome-headless-shell for HyperFrames snapshots
        run: |
          npx @puppeteer/browsers install chrome-headless-shell | tee /tmp/chrome-install.log
          CHROME_PATH="$(grep -o '/[^ ]*/chrome-headless-shell[^ ]*' /tmp/chrome-install.log | head -1)"
          echo "HYPERFRAMES_BROWSER_PATH=${CHROME_PATH}" >> "$GITHUB_ENV"

      - name: Verify component snapshots against baselines
        env:
          HYPERFRAMES_BROWSER_PATH: ${{ env.HYPERFRAMES_BROWSER_PATH }}
        run: |
          cd media/projects/article-videos
          npm run vreg

      - name: Upload visual regression diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: article-video-visual-regression-diffs-${{ github.sha }}
          path: media/projects/article-videos/components/**/diffs/
          if-no-files-found: ignore
          retention-days: 14
