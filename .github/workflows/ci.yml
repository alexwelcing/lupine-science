name: CI

on:
  push:
  pull_request:

concurrency:
  group: lupine-science-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # sitemap lastmod dates come from git history

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check article-video compositions
        working-directory: media/projects/article-videos
        run: npm run check

      - name: Lint source
        run: npm run lint

      - name: Type check (or verify no TypeScript sources)
        run: npm run typecheck

      - name: Run unit tests
        run: npm test

      - name: Build site
        run: npm run build

      - name: Verify static files and links
        run: node scripts/check-static.mjs

      - name: Install PDF verification tools
        run: sudo apt-get update && sudo apt-get install --yes poppler-utils

      - name: Install Playwright browsers for proof-pack PDF rendering
        run: npx playwright install chromium

      - name: Generate proof pack
        run: npm run proofpack

      - name: Verify generated PDF
        run: npm run pdf:check

      - name: Upload built site artifact
        uses: actions/upload-artifact@v4
        with:
          name: lupine-science-public-${{ github.sha }}
          path: public/
          if-no-files-found: error
          retention-days: 14

  visual-regression:
    name: Article-video component visual regression
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install chrome-headless-shell for HyperFrames snapshots
        run: |
          npx @puppeteer/browsers install chrome-headless-shell | tee /tmp/chrome-install.log
          CHROME_PATH="$(grep -o '/[^ ]*/chrome-headless-shell[^ ]*' /tmp/chrome-install.log | head -1)"
          echo "HYPERFRAMES_BROWSER_PATH=${CHROME_PATH}" >> "$GITHUB_ENV"

      - name: Verify component snapshots against baselines
        env:
          HYPERFRAMES_BROWSER_PATH: ${{ env.HYPERFRAMES_BROWSER_PATH }}
        run: |
          cd media/projects/article-videos
          npm run vreg

      - name: Upload visual regression diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: article-video-visual-regression-diffs-${{ github.sha }}
          path: media/projects/article-videos/components/**/diffs/
          if-no-files-found: ignore
          retention-days: 14
