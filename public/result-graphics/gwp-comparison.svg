<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-labelledby="gwp-comparison-title">
  <title id="gwp-comparison-title">Refrigerant 100-year GWP</title>
  <rect width="800" height="450" fill="#faf9f6"/>
  <text x="64" y="42" font-family="Newsreader, Georgia, serif" font-size="22" fill="#16171d" font-weight="500">Refrigerant 100-year GWP</text>
  <text x="64" y="64" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" fill="#6e707a" text-transform="uppercase" letter-spacing="0.06em">IPCC AR6 · mass basis, CO₂ = 1</text>
  <g transform="translate(64,80)">
    <line x1="0" y1="270" x2="696" y2="270" stroke="#e2dfd4" stroke-width="1"/>
    <rect x="27.84" y="269.93" width="83.52" height="0.07" fill="#4c4e58" rx="3"/>
    <text x="69.60" y="261.93" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" fill="#4c4e58">1</text>
    <text x="69.60" y="288.00" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" fill="#4c4e58">CO₂</text>
    <rect x="167.04" y="212.49" width="83.52" height="57.51" fill="#3a8f5b" rx="3"/>
    <text x="208.80" y="204.49" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" fill="#4c4e58">771</text>
    <text x="208.80" y="288.00" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" fill="#4c4e58">R32</text>
    <rect x="306.24" y="101.73" width="83.52" height="168.27" fill="#3d4db3" rx="3"/>
    <text x="348.00" y="93.73" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" fill="#4c4e58">2.3k</text>
    <text x="348.00" y="288.00" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" fill="#4c4e58">R410A</text>
    <rect x="445.44" y="0.00" width="83.52" height="270.00" fill="#3d4db3" rx="3"/>
    <text x="487.20" y="16.00" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" fill="#faf9f6">3.6k</text>
    <text x="487.20" y="288.00" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" fill="#4c4e58">R125</text>
    <rect x="584.64" y="155.88" width="83.52" height="114.12" fill="#3d4db3" rx="3"/>
    <text x="626.40" y="147.88" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" fill="#4c4e58">1.5k</text>
    <text x="626.40" y="288.00" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" fill="#4c4e58">R134a</text>
  </g>
  <text x="64" y="422" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="9" fill="#6e707a">Source: IPCC AR6 WGI Table 7.SM.7</text>
  <text x="64" y="436" font-family="Newsreader, Georgia, serif" font-size="10" fill="#4c4e58" font-style="italic">Lower-GWP refrigerants reduce the non-CO₂ climate forcing from cooling without changing the thermodynamic cycle.</text>
</svg>