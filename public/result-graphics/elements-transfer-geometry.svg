<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-labelledby="elements-transfer-geometry-title">
  <title id="elements-transfer-geometry-title">Error geometry transfers across elements</title>
  <rect width="800" height="450" fill="#faf9f6"/>
  <text x="64" y="42" font-family="Newsreader, Georgia, serif" font-size="22" fill="#16171d" font-weight="500">Error geometry transfers across elements</text>
  <text x="64" y="64" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" fill="#6e707a" text-transform="uppercase" letter-spacing="0.06em">Classical → MLIP preservation of manifold shape</text>
  <g transform="translate(64,80)">
    <line x1="0" y1="270" x2="696" y2="270" stroke="#e2dfd4" stroke-width="1"/>
    <rect x="0" y="67.5" width="696" height="135" fill="#f2efe7" rx="4"/>
    <rect x="0.00" y="67.50" width="649.60" height="135.00" fill="#3a8f5b" rx="2"/>
    <text x="324.80" y="139.00" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="12" fill="#faf9f6">14</text>
    <text x="324.80" y="288.00" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" fill="#4c4e58">Geometry</text>
    <text x="324.80" y="302.00" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" fill="#4c4e58">preserved</text>
    <rect x="649.60" y="67.50" width="46.40" height="135.00" fill="#8a5e1f" rx="2"/>
    <text x="672.80" y="139.00" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="12" fill="#faf9f6">1</text>
    <text x="672.80" y="288.00" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" fill="#4c4e58">Geometry</text>
    <text x="672.80" y="302.00" text-anchor="middle" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="10" fill="#4c4e58">changed</text>
  </g>
  <text x="64" y="422" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="9" fill="#6e707a">Source: Lupine Science MLIP Failure Geometry Audit</text>
  <text x="64" y="436" font-family="Newsreader, Georgia, serif" font-size="10" fill="#4c4e58" font-style="italic">14 of 15 elements keep the same low-dimensional error geometry when moving from classical potentials to foundation MLIPs.</text>
