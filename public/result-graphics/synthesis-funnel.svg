<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-labelledby="synthesis-funnel-title">
  <title id="synthesis-funnel-title">From predicted crystal to commercial cell</title>
  <rect width="800" height="450" fill="#faf9f6"/>
  <text x="220" y="42" font-family="Newsreader, Georgia, serif" font-size="22" fill="#16171d" font-weight="500">From predicted crystal to commercial cell</text>
  <text x="220" y="64" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" fill="#6e707a" text-transform="uppercase" letter-spacing="0.06em">The 0.2% synthesis funnel</text>
  <g transform="translate(220,80)">
    <rect x="0" y="8.10" width="420.00" height="37.80" fill="#3d4db3" opacity="1.00" rx="3"/>
    <text x="430.00" y="31.00" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" fill="#4c4e58">100.0k · 100%</text>
    <text x="-10" y="31.00" text-anchor="end" font-family="Newsreader, Georgia, serif" font-size="12" fill="#16171d">Structures generated</text>
    <rect x="0" y="62.10" width="138.60" height="37.80" fill="#3d4db3" opacity="0.88" rx="3"/>
    <text x="148.60" y="85.00" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" fill="#4c4e58">33.0k · 33%</text>
    <text x="-10" y="85.00" text-anchor="end" font-family="Newsreader, Georgia, serif" font-size="12" fill="#16171d">Thermodynamically stable</text>
    <rect x="0" y="116.10" width="5.04" height="37.80" fill="#3d4db3" opacity="0.76" rx="3"/>
    <text x="15.04" y="139.00" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" fill="#4c4e58">1.2k · 1.2%</text>
    <text x="-10" y="139.00" text-anchor="end" font-family="Newsreader, Georgia, serif" font-size="12" fill="#16171d">Synthesizable in principle</text>
    <rect x="0" y="170.10" width="0.84" height="37.80" fill="#3d4db3" opacity="0.64" rx="3"/>
    <text x="10.84" y="193.00" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" fill="#4c4e58">200 · 0.2%</text>
    <text x="-10" y="193.00" text-anchor="end" font-family="Newsreader, Georgia, serif" font-size="12" fill="#16171d">Experimentally validated</text>
    <rect x="0" y="224.10" width="0.08" height="37.80" fill="#3d4db3" opacity="0.52" rx="3"/>
    <text x="10.08" y="247.00" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="11" fill="#4c4e58">20 · 0.02%</text>
    <text x="-10" y="247.00" text-anchor="end" font-family="Newsreader, Georgia, serif" font-size="12" fill="#16171d">Commercially viable</text>
  </g>
  <text x="220" y="422" font-family="IBM Plex Mono, ui-monospace, monospace" font-size="9" fill="#6e707a">Source: Lupine Science analysis; see The 0.2% Synthesis Problem</text>
  <text x="220" y="436" font-family="Newsreader, Georgia, serif" font-size="10" fill="#4c4e58" font-style="italic">The bottleneck is not generation; it is validated synthesis under real conditions.</text>
</svg>