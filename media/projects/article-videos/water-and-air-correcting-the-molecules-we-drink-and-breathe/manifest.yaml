  - id: stakes
    start: 0
    duration: 17.258
    narration: Water and air touch every human life. Yet water scarcity affects about two billion people, and outdoor air pollution is linked to millions of premature deaths each year. Both problems are materials-limited, and both are corrupted by the same predictable computational error.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Minimal editorial illustration of Earth split between a water drop and an air-breath motif, tiny human silhouettes ringing the equator, soft data counters for two billion water-scarce people and millions of annual air-pollution deaths, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 42
  - id: error-geometry
    start: 17.258
    duration: 21.478
    narration: Universal machine-learning potentials learn tidy bulk crystals where every atom has many regular neighbors. But the membranes, sorbents, and catalysts that purify water and air function at pores, metal centers, and single-atom sites—environments with fewer neighbors. There, the energy surface is systematically softened by 15 to 60 percent.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Minimal editorial illustration of an ordered bulk crystal lattice on the left peeling open into a nanopore, a metal center, and a single-atom catalytic site on the right, coordination-number axis falling from twelve toward four, smooth indigo error band widening into a 15-to-60-percent softening zone, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 43
  - id: false-priorities
    start: 38.736
    duration: 16.943
    narration: A softened barrier makes the wrong membrane look selective, the wrong sorbent look stable, or the wrong catalyst look fast. Across millions of candidates, tiny systematic errors flip rankings. Experiments chase false priorities while better materials stay on the bench.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Minimal editorial illustration of three material leaderboards for membranes, sorbents, and catalysts shuffling dramatically, a red false winner dropping down while a green buried candidate rises to the top, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 44
  - id: water-and-air-targets
    start: 55.679
    duration: 21.541
    narration: Corrected binding and barrier energies overturn raw rankings in desalination membranes, atmospheric-water sorbents, and lithium-selective frameworks. The same correction recovers activation energies for low-temperature exhaust catalysts, soot filters, and volatile-organic-compound oxidizers, separating real activity from artificial promise.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Minimal editorial illustration of six environmental material icons arranged radially around a central coordination-defect motif: a desalination membrane, an atmospheric-water metal-organic framework, a lithium-selective framework, a low-temperature exhaust catalyst, a soot filter, and a volatile-organic-compound oxidizer, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 45
  - id: measure-correct-prove
    start: 77.22
    duration: 20.785
    narration: The correction measures error as a field over local coordination, anchored to three observables and pinned to zero in bulk. Analytic forces are added at runtime, keeping molecular dynamics nearly as fast as the base model. Across 36 blind model-material pairs, corrected predictions correlate at 0.906 with zero fitted parameters.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Minimal editorial illustration of a smooth coordination-error field curve anchored by three amber knots, pinned to zero at the bulk-coordination endpoint, a pipeline flowing from a uMLIP block through an additive correction layer to analytic force arrows, a metric card showing r equals 0.906 and n equals 36, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 46
  - id: verification
    start: 98.005
    duration: 18.455
    narration: One hundred ninety build-locked Lean 4 theorems mark which claims are supported, bounded, or synthesis-dependent. A membrane ranking is supported only when its local environments fall inside the measured domain, and a metastable sorbent phase is flagged honestly rather than sold as predicted.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Minimal editorial illustration of a machine-check ribbon stamping claims as supported, bounded, or synthesis-dependent, a membrane pore highlighted inside a measured-domain boundary, a metastable sorbent phase moving from predicted to flagged, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 47
  - id: platform-thesis
    start: 116.46
    duration: 15.432
    narration: The failure mode is coordination-specific, not climate-specific. One measured correction-and-verification layer can raise discovery reliability across water, air, batteries, and direct air capture. The goal is predictions laboratories can trust.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Minimal editorial illustration of seven environmental domains orbiting a shared coordination-defect geometry, converging into a single correction-and-verification layer, closing into the thesis measure correct prove, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean editorial vector style, no text, 16:9
      size: landscape_16_9
      seed: 48
