scenes:
  - id: promise-gap
    start: 0
    duration: 21.761
    narration: 'Foundation machine-learned interatomic potentials promise density-functional accuracy at classical cost. On bulk crystals they nearly deliver: lattice constants within half a percent, formation enthalpies within a few percent. But on surfaces and vacancies—the properties that decide real materials questions—they miss by ten to forty percent.'
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Split editorial illustration of an ordered bulk crystal lattice on the left and a stepped surface with a vacancy on the right, smooth indigo error band widening from the ordered side into a 10–40 percent region, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 101
  - id: null-kills
    start: 21.761
    duration: 16.749
    narration: The obvious hypotheses were tested with coupling-aware nulls. Two died. Cross-property error is not low-dimensional. Raw cosine similarities as high as zero point nine six sit inside a null that reaches zero point nine eight. The kills are preserved in the record.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Two hypothesis cards fading into a muted null band, a participation-ratio dot and a cosine-similarity bar both landing inside the shaded null region, stamped as preserved kills, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 102
  - id: rankings-survive
    start: 38.51
    duration: 18.018
    narration: What survived is more useful. Ask any model which metal has the higher surface energy, and it almost never lies. Rank correlations run from zero point eight eight to one point zero zero zero. All twenty-two reference facet hierarchies reproduce. The order is right; the size is wrong.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Row of metal surface-energy bars in wrong absolute heights but correct left-to-right order, a rank-correlation ribbon locking from 0.88 to 1.000, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 103
  - id: form-and-field
    start: 56.528
    duration: 22.712
    narration: 'The error has a shape: prediction equals c times T to the alpha. The exponent belongs to the property family; the prefactor belongs to the training data. Beneath both is a smooth error field over coordination. From three observables it predicted a fourth surface blind, with r equals zero point nine oh six across thirty-six cells and zero fitted parameters.'
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Power-law curve splitting into an exponent alpha pinned to a property family and a prefactor c pinned to training data, then dissolving into a smooth indigo coordination-error field with three amber anchor knots and a shaded blind-prediction region, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 104
  - id: correction
    start: 79.24
    duration: 21.761
    narration: The correction is an additive energy term with analytic forces, running beside the live model. Over CHGNet it cut nickel surface error from nine point seven to one point five percent, copper from twenty-eight to thirteen point seven percent, and left bulk untouched. Where order breaks, a theorem proves no monotone fix can recover references.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Compact machine-learning potential block feeding through an additive correction layer into analytic force arrows, before-and-after bars shrinking for nickel and copper while a bulk lattice stays pinned and unchanged, a separate red-x panel marking the ranking-inversion impossibility, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 105
  - id: verification
    start: 101.001
    duration: 16.622
    narration: Every quantitative claim is sealed as a Lean theorem over provenance-hashed data. The verification layer once rejected a result when decide refused eight thirteen less than eight thirteen. The correction edits the science toward honesty, not just better numbers.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Machine-check ribbon threading across quantitative claims, one inequality 813 less than 813 flashing refused and replaced by a corrected value, a proof-stamp resolving to honesty, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 106
  - id: takeaway
    start: 117.623
    duration: 15.732
    narration: For screening today, rankings are trustworthy where order holds. For certification, a handful of anchor measurements plus the family exponent buys a several-fold error reduction. Where the order is broken, the proof is provided, not a worse number.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Three converging editorial paths—screen with ordered candidates, certify with anchor knots on a coordination field, boundary with a proof gate—collapsing into a single closing thesis order size proof, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 107
