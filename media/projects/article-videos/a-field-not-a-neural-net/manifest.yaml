scenes:
  - id: scene-01
    start: 0
    duration: 8.64
    narration: Okay, so Google DeepMind predicted 2.2 million crystals. Huge. But by late 2023, only 736 had been independently synthesized.
    visual:
      type: image
      prompt: local article image asset
  - id: scene-02
    start: 8.64
    duration: 13.201
    narration: 'The usual response is: build a bigger neural net. What if that is solving the wrong problem? Universal machine-learning potentials are already fast and pretty accurate for tidy bulk crystals.'
    visual:
      type: image
      prompt: local article image asset
  - id: scene-03
    start: 21.841
    duration: 14.1
    narration: But real materials work at vacancies, surfaces, and transition states—places where atoms have fewer neighbors. There, errors jump, and ion-migration barriers can be underestimated by more than 60 percent.
    visual:
      type: image
      prompt: local article image asset
  - id: scene-04
    start: 35.941
    duration: 13.616
    narration: 'Here is the twist: that wrongness is not random. It has a shape. The correction measures an environment error field based on coordination number—basically, how many neighboring atoms each atom has.'
    visual:
      type: image
      prompt: local article image asset
  - id: scene-05
    start: 49.557
    duration: 12.441
    narration: 'No second neural net. No per-system retraining. Three standard measurements anchor the curve: two surface energies and one vacancy energy. Bulk coordination is fixed at zero error.'
    visual:
      type: image
      prompt: local article image asset
  - id: scene-06
    start: 61.998
    duration: 12.095
    narration: Then the field predicts a fourth surface—the one-ten facet—blind. Across 36 model-and-material combinations, predicted and measured errors correlate at zero point nine oh six.
    visual:
      type: image
      prompt: local article image asset
  - id: scene-07
    start: 74.093
    duration: 12.994
    narration: Flip that field, add it beside the existing model, and under-coordinated structures move back toward reference energies. The forces are analytic, so simulations stay physically consistent.
    visual:
      type: image
      prompt: local article image asset
  - id: scene-08
    start: 87.087
    duration: 12.51
    narration: 'In tests, nickel surface error dropped from 9.7 to 1.5 percent, while bulk lattice constants stayed unchanged. And this layer does something most AI pipelines cannot: it can say no.'
    visual:
      type: image
      prompt: local article image asset
  - id: scene-09
    start: 99.597
    duration: 14.929
    narration: Lean four proofs check every quantitative claim and flag ranking inversions, already-converged cases, or physics outside the field’s domain. One proof even caught a rounding tie and corrected “27 improvements” to 26.
    visual:
      type: image
      prompt: local article image asset
  - id: scene-10
    start: 114.526
    duration: 20.736
    narration: That matters for battery ion hops, carbon-capture frameworks, ammonia catalysts, and perovskite stability—all controlled by under-coordinated defects. So the goal is not more confident predictions. It is fast predictions with measured corrections, certified boundaries, and a provable reason to stop.
    visual:
      type: image
      prompt: local article image asset
