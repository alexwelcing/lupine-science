<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 720 540" role="img" aria-labelledby="t d"><title id="t">Three anchors fix the field</title><desc id="d">Two surface-energy anchors and one vacancy-energy anchor define a smooth error field fixed to zero at bulk coordination 12.</desc><rect width="720" height="540" fill="#faf9f6"/><text x="360" y="56" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" font-weight="700" fill="#1a1a1a">THREE ANCHORS FIX THE FIELD</text><line x1="80" y1="430" x2="670" y2="430" stroke="#1a1a1a" stroke-width="3"/><line x1="80" y1="95" x2="80" y2="430" stroke="#1a1a1a" stroke-width="3"/><path d="M112 118 C195 170 230 225 322 285 C420 350 515 378 645 430" fill="none" stroke="#3d4db3" stroke-width="9"/><g fill="#3d4db3" stroke="#1a1a1a" stroke-width="3"><circle cx="220" cy="210" r="13"/><circle cx="325" cy="288" r="13"/><circle cx="530" cy="390" r="13"/></g><circle cx="645" cy="430" r="13" fill="#597c68" stroke="#1a1a1a" stroke-width="3"/><g font-family="Arial,sans-serif" font-size="36" font-weight="700" fill="#1a1a1a"><text x="108" y="145">(110) SURFACE</text><text x="238" y="270">(111) SURFACE</text><text x="440" y="360">VACANCY</text><text x="430" y="486" fill="#597c68">BULK P(12)=0</text></g><text x="315" y="525" font-family="Arial,sans-serif" font-size="36" fill="#1a1a1a">COORDINATION c</text></svg>