<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1680 540" role="img" aria-labelledby="t d"><title id="t">Blind prediction correlation</title><desc id="d">Thirty-six predicted and measured surface-energy errors correlate at r equals 0.906.</desc><rect width="1680" height="540" fill="#faf9f6"/><text x="840" y="54" text-anchor="middle" font-family="Arial,sans-serif" font-size="40" font-weight="700" fill="#1a1a1a">r = 0.906 · BLIND PREDICTION · n = 36</text><line x1="330" y1="455" x2="1170" y2="455" stroke="#1a1a1a" stroke-width="4"/><line x1="330" y1="90" x2="330" y2="455" stroke="#1a1a1a" stroke-width="4"/><line x1="350" y1="430" x2="1125" y2="112" stroke="#1a1a1a" stroke-width="4" stroke-dasharray="14 10"/><g fill="#3d4db3" opacity=".82" stroke="#1a1a1a" stroke-width="2"><circle cx="420" cy="397" r="10"/><circle cx="455" cy="372" r="10"/><circle cx="480" cy="350" r="10"/><circle cx="512" cy="365" r="10"/><circle cx="535" cy="330" r="10"/><circle cx="558" cy="312" r="10"/><circle cx="582" cy="325" r="10"/><circle cx="605" cy="290" r="10"/><circle cx="630" cy="275" r="10"/><circle cx="654" cy="295" r="10"/><circle cx="680" cy="252" r="10"/><circle cx="705" cy="268" r="10"/><circle cx="730" cy="225" r="10"/><circle cx="758" cy="240" r="10"/><circle cx="785" cy="205" r="10"/><circle cx="812" cy="180" r="10"/><circle cx="840" cy="198" r="10"/><circle cx="872" cy="160" r="10"/><circle cx="905" cy="145" r="10"/><circle cx="945" cy="120" r="10"/></g><g font-family="Arial,sans-serif" font-size="38" fill="#1a1a1a"><text x="655" y="520">MEASURED SIGNED ERROR</text><text x="95" y="360" transform="rotate(-90 95 360)">PREDICTED SIGNED ERROR</text><text x="1210" y="170" font-weight="700">95% CI [0.82, 0.96]</text><text x="1210" y="230">p = 10⁻⁴</text><text x="1210" y="300" fill="#a84242">Permutation null r = 0.44</text></g></svg>