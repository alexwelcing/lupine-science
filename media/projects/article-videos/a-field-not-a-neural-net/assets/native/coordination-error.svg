<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 720 540" role="img" aria-labelledby="t d"><title id="t">Signed error by coordination</title><desc id="d">Errors increase sharply as local coordination falls from bulk coordination 12 toward surfaces and transition states.</desc><rect width="720" height="540" fill="#faf9f6"/><text x="360" y="54" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" font-weight="700" fill="#1a1a1a">ERROR HAS A SHAPE</text><line x1="92" y1="430" x2="660" y2="430" stroke="#1a1a1a" stroke-width="3"/><line x1="92" y1="95" x2="92" y2="430" stroke="#1a1a1a" stroke-width="3"/><path d="M92 122 C190 185 272 240 370 292 C470 344 565 372 660 388" fill="none" stroke="#3d4db3" stroke-width="9"/><g font-family="Arial,sans-serif" font-size="36" font-weight="700"><text x="105" y="112" fill="#a84242">SURFACES</text><text x="260" y="205" fill="#b27a20">ION BARRIERS</text><text x="468" y="330" fill="#597c68">VACANCIES</text><text x="440" y="410" fill="#597c68">BULK MAE · 29–81</text></g><g font-family="Arial,sans-serif" font-size="36" fill="#1a1a1a"><text x="80" y="472">7</text><text x="625" y="472">12</text><text x="320" y="520">LOCAL COORDINATION c</text><text x="35" y="350" transform="rotate(-90 35 350)">SIGNED ERROR</text></g></svg>