<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 720 540" role="img" aria-labelledby="t d"><title id="t">Synthesis validation bottleneck</title><desc id="d">2.2 million predicted structures narrow to 736 independently synthesized crystals.</desc><rect width="720" height="540" fill="#faf9f6"/><text x="360" y="62" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" font-weight="700" fill="#1a1a1a">SYNTHESIS BOTTLENECK</text><path d="M90 120H630L535 220H185Z" fill="#3d4db3"/><path d="M185 234H535L465 330H255Z" fill="#d99a32"/><path d="M255 344H465L420 430H300Z" fill="#597c68"/><g text-anchor="middle" font-family="Arial,sans-serif" font-size="36" font-weight="700" fill="white"><text x="360" y="162">PREDICTED</text><text x="360" y="202">2.2 MILLION</text><text x="360" y="276">CLAIMED</text><text x="360" y="316">63%</text><text x="360" y="382">VALIDATED</text><text x="360" y="422">736</text></g><text x="360" y="498" text-anchor="middle" font-family="Arial,sans-serif" font-size="36" fill="#1a1a1a">Independent synthesis remains the bottleneck</text></svg>