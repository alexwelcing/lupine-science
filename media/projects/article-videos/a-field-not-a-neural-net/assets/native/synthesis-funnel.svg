<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" aria-labelledby="t d" role="img" viewBox="0 0 720 540"><title id="t">Synthesis validation bottleneck</title><desc id="d">2.2 million predicted structures narrow to 736 independently synthesized crystals.</desc><rect width="720" height="540" fill="#faf9f6"/><text x="360" y="62" fill="#1a1a1a" font-family="Arial,sans-serif" font-size="36" font-weight="700" text-anchor="middle">SYNTHESIS BOTTLENECK</text><path fill="#3d4db3" d="M90 120H630L535 220H185Z"/><path fill="#d99a32" d="M185 234H535L465 330H255Z"/><path fill="#597c68" d="M255 344H465L420 430H300Z"/><g fill="#fff" font-family="Arial,sans-serif" font-size="36" font-weight="700" text-anchor="middle"><text x="360" y="162">PREDICTED</text><text x="360" y="202">2.2 MILLION</text><text x="360" y="276">CLAIMED</text><text x="360" y="316">63%</text><text x="360" y="382">VALIDATED</text><text x="360" y="422">736</text></g><text x="360" y="498" fill="#1a1a1a" font-family="Arial,sans-serif" font-size="36" text-anchor="middle">Independent synthesis remains the bottleneck</text></svg>