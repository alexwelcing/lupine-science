scenes:
  - id: hook
    start: 0
    duration: 14.804
    narration: Generative AI can now invent millions of metal-organic frameworks at machine speed. What it cannot yet do is promise that any of them can actually be made. In the first half of 2026, that gap has become the central bottleneck in materials AI.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Minimal editorial illustration of a generative AI model pouring out countless metal-organic framework structures as geometric wireframe lattices, a narrow filter letting only one certified structure pass while most dissolve into mist, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 101
  - id: synthesis-gap
    start: 14.804
    duration: 16.945
    narration: A structure that is stable on a computer screen may be kinetically inaccessible, chemically incompatible with real solvents, or so strained that it collapses the moment it is removed from the simulation box. Until that changes, most AI-generated MOFs remain fantasy frameworks.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Split-screen editorial illustration: left side shows a perfect glowing metal-organic framework lattice on a computer monitor, right side shows the same lattice crumbling into fragments at the touch of a solvent droplet, warm cream background #faf9f6, indigo structural lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 102
  - id: certificate
    start: 31.749
    duration: 20.065
    narration: 'The proposed fix is a makeability layer encoded in the Lean 4 proof assistant. It turns the rules of assembly, stability, and synthesis into formal theorems. The output is not a prediction. It is a certificate: a machine-checkable argument that a candidate satisfies explicitly stated assumptions for a given synthesis protocol.'
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Clean editorial illustration of a metal-organic framework assembly being checked by a formal proof ribbon, metal nodes and organic linkers snapping into validated positions, a certificate seal emerging from the structure, warm cream paper background #faf9f6, indigo accents #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 103
  - id: flywheel
    start: 51.814
    duration: 20.432
    narration: Tethered to a real lab, the method becomes a self-improving flywheel. Formal predicates filter candidate structures. Only certified candidates reach synthesis. Both success and failure are logged formally. Each failed synthesis tightens the certificate and rules out an entire class of future candidates, making the next cycle faster.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Minimal circular flywheel diagram with four connected stages labeled formalize, simulate, synthesize, and feedback, arrows flowing between them, a single bright metal-organic framework moving through each stage while failed candidates are pulled into a rule-update loop, warm cream background #faf9f6, indigo accent lines #3d4db3, clean editorial vector style, no text, 16:9
      size: landscape_16_9
      seed: 104
  - id: starting-point
    start: 72.246
    duration: 20.371
    narration: 'The starting point is intentionally narrow: over the first twelve to eighteen months, focus on one MOF family, one synthesis modality, one stability stressor, one database, and one closed-loop pilot. That discipline reflects a track record of eighty-five formally proven lemmas and zero remaining sorry axioms in the existing theory.'
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Editorial illustration of a narrow experimental pipeline with five chambers showing one MOF family, one synthesis modality, one stability stressor, one database, and one closed-loop pilot, beside a proof ledger with checkmarks, warm cream background #faf9f6, indigo accents #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 105
  - id: thesis
    start: 92.617
    duration: 15.661
    narration: The next frontier in materials discovery is not generating more structures. It is proving which ones are worth making. The verification layer gives materials scientists a reason to trust a candidate before they spend time, money, and reagents on the bench.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Editorial illustration of a laboratory bench with one bright certified metal-organic framework in the foreground, countless gray unverified structures fading into the background, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 106
