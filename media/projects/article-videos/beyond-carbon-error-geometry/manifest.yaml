    narration: What do desalination membranes, methane catalysts, safer refrigerants, lithium recovery, PFAS cleanup, clean-air catalysts, and low-carbon cement have in common?
    visual:
      type: image
      prompt: local article image asset
  - id: scene-02
    start: 11.022089097608617
    duration: 14.598586565105844
    narration: Weirdly, the same atomic blind spot. The materials bottleneck is not climate-specific. It is coordination-specific. Universal machine-learning potentials learn tidy bulk crystals, where atoms have lots of regular neighbors.
    visual:
      type: image
      prompt: local article image asset
  - id: scene-03
    start: 25.62067566271446
    duration: 14.073048811740493
    narration: But useful chemistry happens at pores, surfaces, vacancies, and transition states—where atoms have fewer neighbors. Right there, these models can soften the energy landscape by 15 to 60 percent.
    visual:
      type: image
      prompt: local article image asset
  - id: scene-04
    start: 39.69372447445495
    duration: 16.675170877052214
    narration: That is not harmless noise. A softened barrier can make the wrong membrane look selective, the wrong catalyst look fast, or an unmakeable cement phase look stable. Across millions of candidates, tiny systematic errors flip rankings—and experiments chase false winners.
    visual:
      type: image
      prompt: local article image asset
  - id: scene-05
    start: 56.36889535150716
    duration: 14.098615513255572
    narration: 'The stakes are huge: water scarcity affects roughly two billion people. Air pollution kills millions every year. Methane drives about 30 percent of current warming. Clean-energy mineral demand could rise four- to six-fold by 2040.'
    visual:
      type: image
      prompt: local article image asset
  - id: scene-06
    start: 70.46751086476273
    duration: 12.783350757535755
    narration: 'And cement alone produces roughly 2.8 gigatonnes of carbon dioxide annually. The correction''s response starts with the useful part: the error has a shape. Three measured observables anchor an environment error field.'
    visual:
      type: image
      prompt: local article image asset
  - id: scene-07
    start: 83.25086162229849
    duration: 18.648068010631906
    narration: Bulk coordination is fixed at zero error, and a constrained curve predicts corrections for under-coordinated environments the field never directly saw. Add that field at runtime, and simulations follow corrected energies and analytic forces—still about one hundred thousand times faster than quantum chemistry.
    visual:
      type: image
      prompt: local article image asset
  - id: scene-08
    start: 101.89892963293039
    duration: 16.128327539090964
    narration: In blind tests across 36 model-material pairs, predicted corrections correlated at 0.906. Then 77 build-locked Lean 4 theorems mark what is supported, out of domain, or synthesis-dependent.
    visual:
      type: image
      prompt: local article image asset
  - id: scene-09
    start: 118.02725717202135
    duration: 11.3786025465132
    narration: So this is bigger than carbon. One correction-and-verification layer can improve discovery across water, air, methane, refrigerants, minerals, PFAS, and cement. Measure the error.
    visual:
      type: image
      prompt: local article image asset
  - id: scene-10
    start: 129.40585971853454
    duration: 5.124703281465457
    narration: Correct the physics. Prove the boundary. Then send experiments the candidates actually worth making.
