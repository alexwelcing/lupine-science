<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Lupine Science component gallery — title card</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #showcase-root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
      }

      .showcase-ground {
        position: absolute;
        inset: 0;
        background-color: #faf9f6;
      }
    </style>
  </head>
  <body>
    <div
      id="showcase-root"
      data-composition-id="article-video-components"
      data-start="0"
      data-width="1920"
      data-height="1080"
      data-duration="6"
      data-fps="30"
    >
      <div class="showcase-ground"></div>
      <div
        id="title-card-host"
        data-composition-id="title-card"
        data-composition-src="compositions/title-card.html"
        data-variable-values='{"episode":"ARTICLE VIDEO · FIELD NOTE","title":"The 0.2% Synthesis Problem","deck":"Why most AI-predicted materials never reach a lab"}'
        data-start="0"
        data-duration="6"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["article-video-components"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
