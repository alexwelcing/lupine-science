<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Editorial grid dark background</title>
  <desc id="desc">A navy editorial background with cyan and violet glow, a fine grid, and generous safe areas for article-video typography.</desc>
  <defs>
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.55" stop-color="#0b1730"/>
      <stop offset="1" stop-color="#11152b"/>
    </linearGradient>
    <radialGradient id="cyan" cx="0" cy="0" r="1" gradientTransform="translate(1560 180) rotate(145) scale(760 560)">
      <stop offset="0" stop-color="#22d3ee" stop-opacity=".28"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="violet" cx="0" cy="0" r="1" gradientTransform="translate(220 960) rotate(-25) scale(700 520)">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity=".24"/>
      <stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0H0V80" fill="none" stroke="#dbeafe" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#base)"/>
  <rect width="1920" height="1080" fill="url(#cyan)"/>
  <rect width="1920" height="1080" fill="url(#violet)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <path d="M1120 0h800v8h-800z" fill="#22d3ee" opacity=".75"/>
  <path d="M0 1072h610v8H0z" fill="#8b5cf6" opacity=".8"/>
</svg>
