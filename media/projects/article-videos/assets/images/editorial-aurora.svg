<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">Editorial aurora background</title>
  <desc id="desc">Deep charcoal field with layered green, blue, and purple aurora ribbons for title and transition cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#060a0f"/>
      <stop offset="1" stop-color="#101826"/>
    </linearGradient>
    <linearGradient id="ribbonA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399" stop-opacity="0"/>
      <stop offset=".35" stop-color="#34d399" stop-opacity=".72"/>
      <stop offset=".68" stop-color="#38bdf8" stop-opacity=".68"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ribbonB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset=".5" stop-color="#a78bfa" stop-opacity=".55"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="42"/></filter>
  </defs>
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <path d="M-180 790C270 430 520 980 970 610s670-150 1120-490" fill="none" stroke="url(#ribbonA)" stroke-width="180" filter="url(#blur)" opacity=".65"/>
  <path d="M-160 890C310 580 640 1020 1080 700s650-230 1010-10" fill="none" stroke="url(#ribbonA)" stroke-width="34" opacity=".86"/>
  <path d="M-120 170c450 310 760-40 1130 170s590 270 1020 40" fill="none" stroke="url(#ribbonB)" stroke-width="120" filter="url(#blur)" opacity=".42"/>
  <rect x="64" y="64" width="1792" height="952" rx="28" fill="none" stroke="#e2e8f0" stroke-opacity=".10" stroke-width="2"/>
</svg>
