scenes:
  - id: belief
    start: 0
    duration: 20.914
    narration: 'Molecular structures should not live behind a paywall, a download, or a command line. The moment someone wants to see what a prediction looks like, the tool should already be open in the browser. That is the idea behind LUPI: a lightweight, web-native molecular viewer that lets anyone rotate, measure, and share a structure.'
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Minimal editorial illustration of a molecular structure floating inside an open browser window, gentle rotation implied, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 101
  - id: problem
    start: 20.914
    duration: 19.37
    narration: Most molecular viewers are either too heavy to share or too simple to trust. Desktop tools are powerful, but they trap knowledge on one machine. Screenshot culture replaces real exploration. Lightweight web viewers often hide the coordinates, uncertainty, and context that make a structure meaningful.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Split editorial scene: left side a heavy desktop workstation chained to a single building, right side an oversimplified mobile viewer with fading coordinates and hidden data, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 102
  - id: middle-path
    start: 40.284
    duration: 15.637
    narration: LUPI sits in the middle. Built for the web first, with enough fidelity to inspect real predictions and enough simplicity to drop into a paper, a slide, or a classroom. No installation. No account. No friction between the data and the observer.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Browser window at center showing a detailed molecular model, with a paper document, a slide, and a classroom chalkboard orbiting gently around it, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 103
  - id: three-jobs
    start: 55.921
    duration: 20.721
    narration: 'It has three jobs. Show structures as they are: load standard formats, render faithfully, and expose the underlying data. Make measurement effortless: distance, angle, and coordination environments a click away, not a plugin away. And let the claim travel: every structure can be linked, embedded, and inspected by anyone.'
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Three horizontal editorial panels: exposed molecular coordinate data, a measurement cursor clicking distance and angle on a structure, and a shareable link chain connecting embedded viewers, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 104
  - id: verification-layer
    start: 76.642
    duration: 12.613
    narration: 'Under the hood, the viewer connects to a formalized makeability record: a growing chain of commitments, simulations, and certificates that say not just what a structure is, but why it can be made.'
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Pipeline illustration from commitment documents through simulation certificates to a verified molecular model, chain-of-trust links lighting up in sequence, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 105
  - id: invitation
    start: 89.255
    duration: 23.489
    narration: Three things make a browser-native viewer the right shape right now. WebGL and WebGPU can render complex molecular scenes smoothly on ordinary devices. Generative models are producing more structures than ever, and each one needs a URL, not just a filename. Open science is pushing tools toward public, inspectable interfaces. LUPI is live. Try it at lupi dot live.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Three converging streams: a GPU chip rendering a molecular scene, generative models pouring structures into URL links, and an open public interface, all flowing into a single browser viewer, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 106
