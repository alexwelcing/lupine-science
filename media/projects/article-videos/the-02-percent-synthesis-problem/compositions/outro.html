<!doctype html>
<html
  lang="en"
  data-composition-variables='[
    {"id":"cta","type":"string","label":"Closing call to action","default":"Follow the evidence.","maxLength":42},
    {"id":"destination","type":"string","label":"Article URL","default":"LUPINE.SCIENCE / ARTICLES","maxLength":36},
    {"id":"proofLabel","type":"string","label":"Proof-pack label","default":"READ · TRACE · QUESTION","maxLength":24}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Lupine Science outro</title>
  </head>
  <body>
    <!--
      Reusable 6-second close. Overlay during the first 0.7 seconds to let the
      paper ground perform the prescribed paper fade; the lockup then remains
      fully visible through the final two seconds.
    -->
    <template>
      <style>
        @font-face {
          font-family: "Newsreader";
          src: url("/assets/brand/newsreader-var.woff2") format("woff2");
          font-style: normal;
          font-weight: 300 700;
          font-display: block;
        }

        @font-face {
          font-family: "Newsreader";
          src: url("/assets/brand/newsreader-italic-var.woff2") format("woff2");
          font-style: italic;
          font-weight: 300 700;
          font-display: block;
        }

        @font-face {
          font-family: "IBM Plex Mono";
          src: url("/assets/brand/plex-mono-400.woff2") format("woff2");
          font-style: normal;
          font-weight: 400;
          font-display: block;
        }

        @font-face {
          font-family: "IBM Plex Mono";
          src: url("/assets/brand/plex-mono-600.woff2") format("woff2");
          font-style: normal;
          font-weight: 600;
          font-display: block;
        }

        * {
          box-sizing: border-box;
        }

        #outro-root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          color: #1a1a1a;
          font-family: "Newsreader", serif;
        }

        .outro-clip {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
        }

        .outro-ground {
          position: absolute;
          inset: 0;
          background-color: #faf9f6;
        }

        .outro-wash {
          position: absolute;
          left: 535px;
          top: 92px;
          width: 850px;
          height: 850px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(61, 77, 179, 0.2) 0%, rgba(61, 77, 179, 0) 70%);
          transform-origin: center;
        }

        .outro-field {
          position: absolute;
          inset: 0;
          opacity: 0.22;
          background-image: radial-gradient(rgba(61, 77, 179, 0.18) 1px, rgba(61, 77, 179, 0) 1px);
          background-size: 36px 36px;
          mask-image: radial-gradient(circle at 50% 42%, #1a1a1a 0%, transparent 70%);
        }

        .outro-lockup {
          position: absolute;
          left: 510px;
          top: 150px;
          width: 900px;
          height: 570px;
          display: flex;
          flex-direction: column;
          align-items: center;
          text-align: center;
        }

        .outro-mark-wrap {
          position: relative;
          width: 360px;
          height: 270px;
          display: grid;
          place-items: center;
        }

        .outro-mark {
          display: block;
          width: 180px;
          height: 180px;
          object-fit: contain;
        }

        .outro-orbit {
          position: absolute;
          left: 0;
          top: 0;
          width: 360px;
          height: 270px;
          border: 2px solid rgba(61, 77, 179, 0.32);
          border-radius: 50%;
        }

        .outro-orbit::before,
        .outro-orbit::after {
          content: "";
          position: absolute;
          background-color: #3d4db3;
        }

        .outro-orbit::before {
          left: -18px;
          top: 134px;
          width: 396px;
          height: 2px;
        }

        .outro-orbit::after {
          left: 179px;
          top: -18px;
          width: 2px;
          height: 306px;
        }

        .outro-wordmark {
          margin: 16px 0 0;
          font-size: 88px;
          font-weight: 400;
          line-height: 0.98;
          letter-spacing: -0.025em;
        }

        .outro-cta {
          margin: 34px 0 0;
          max-width: 900px;
          font-size: 72px;
          font-weight: 400;
          line-height: 1.08;
          letter-spacing: -0.015em;
          text-wrap: balance;
        }

        .outro-evidence-rule {
          position: absolute;
          left: 96px;
          top: 738px;
          width: 1728px;
          height: 4px;
          background-color: #3d4db3;
          transform-origin: center center;
        }

        .outro-lower {
          position: absolute;
          left: 120px;
          top: 790px;
          width: 1680px;
          height: 124px;
          display: flex;
          align-items: flex-start;
          justify-content: space-between;
          gap: 72px;
        }

        .outro-destination,
        .outro-proof-label {
          margin: 0;
          font-family: "IBM Plex Mono", monospace;
          font-size: 36px;
          line-height: 1.2;
          text-transform: uppercase;
          white-space: nowrap;
        }

        .outro-destination {
          color: #1a1a1a;
          font-weight: 600;
          letter-spacing: 0.08em;
        }

        .outro-proof-label {
          color: #6b7c8e;
          font-weight: 400;
          letter-spacing: 0.04em;
        }

        .outro-registration {
          position: absolute;
          width: 30px;
          height: 30px;
        }

        .outro-registration::before,
        .outro-registration::after {
          content: "";
          position: absolute;
          background-color: #3d4db3;
        }

        .outro-registration::before {
          left: 14px;
          top: 0;
          width: 2px;
          height: 30px;
        }

        .outro-registration::after {
          left: 0;
          top: 14px;
          width: 30px;
          height: 2px;
        }

        .outro-registration-a {
          left: 105px;
          top: 69px;
        }

        .outro-registration-b {
          right: 105px;
          bottom: 69px;
        }
      </style>

      <div
        id="outro-root"
        data-composition-id="outro"
        data-width="1920"
        data-height="1080"
        data-duration="6"
        data-fps="30"
      >
        <section id="outro-scene" class="clip outro-clip" data-start="0" data-duration="6" data-track-index="0">
          <div class="outro-ground" data-layout-ignore></div>
          <div class="outro-wash" data-layout-ignore></div>
          <div class="outro-field" data-layout-ignore></div>

          <div class="outro-lockup" data-layout-allow-overlap>
            <div class="outro-mark-wrap">
              <span class="outro-orbit" data-layout-ignore></span>
              <img id="outro-mark" class="outro-mark" src="assets/brand/lupine-science-mark.svg" alt="Lupine Science" />
            </div>
            <p id="outro-wordmark" class="outro-wordmark" data-layout-allow-occlusion>Lupine Science</p>
            <p id="outro-cta" class="outro-cta" data-layout-allow-occlusion data-var-text="cta">Follow the evidence.</p>
          </div>

          <span class="outro-evidence-rule" data-layout-ignore></span>
          <div class="outro-lower">
            <p id="outro-destination" class="outro-destination" data-layout-allow-occlusion data-var-text="destination">LUPINE.SCIENCE / ARTICLES</p>
            <p id="outro-proof-label" class="outro-proof-label" data-layout-allow-occlusion data-var-text="proofLabel">READ · TRACE · QUESTION</p>
          </div>

          <span class="outro-registration outro-registration-a" data-layout-ignore></span>
          <span class="outro-registration outro-registration-b" data-layout-ignore></span>
        </section>
      </div>

      <script>
        window.__timelines = window.__timelines || {};

        const outroRoot = document.querySelector("#outro-root");
        const outroHost = outroRoot.closest("[data-variable-values]");
        if (outroHost) {
          const values = JSON.parse(outroHost.getAttribute("data-variable-values") || "{}");
          Object.entries(values).forEach(([id, value]) => {
            const target = outroRoot.querySelector('[data-var-text="' + id + '"]');
            if (target && typeof value === "string") target.textContent = value;
          });
        }

        const outroLimits = { cta: 42, destination: 36, proofLabel: 24 };
        Object.entries(outroLimits).forEach(([field, limit]) => {
          const target = outroRoot.querySelector('[data-var-text="' + field + '"]');
          const length = Array.from(target.textContent.trim()).length;
          if (!length || length > limit) {
            throw new Error(`[outro] ${field} must contain 1–${limit} characters; received ${length}.`);
          }
        });

        const outroTimeline = gsap.timeline({ paused: true });
        outroTimeline.fromTo(
          ".outro-ground",
          { opacity: 0 },
          { opacity: 1, duration: 0.7, ease: "sine.inOut" },
          0,
        );
        outroTimeline.fromTo(
          [".outro-wash", ".outro-field"],
          { opacity: 0 },
          { opacity: 1, duration: 0.9, stagger: 0.08, ease: "sine.out" },
          0.16,
        );
        outroTimeline.fromTo(
          ".outro-orbit",
          { opacity: 0, scale: 0.78 },
          { opacity: 1, scale: 1, duration: 0.82, ease: "power3.out" },
          0.42,
        );
        outroTimeline.fromTo(
          "#outro-mark",
          { opacity: 0, scale: 0.94 },
          { opacity: 1, scale: 1, duration: 0.68, ease: "expo.out" },
          0.7,
        );
        outroTimeline.fromTo(
          "#outro-wordmark",
          { opacity: 0, y: 30 },
          { opacity: 1, y: 0, duration: 0.58, ease: "power3.out" },
          0.98,
        );
        outroTimeline.fromTo(
          "#outro-cta",
          { opacity: 0, y: 42 },
          { opacity: 1, y: 0, duration: 0.7, ease: "expo.out" },
          1.24,
        );
        outroTimeline.fromTo(
          ".outro-evidence-rule",
          { scaleX: 0 },
          { scaleX: 1, duration: 0.52, ease: "power2.inOut" },
          1.48,
        );
        outroTimeline.fromTo(
          ["#outro-destination", "#outro-proof-label"],
          { opacity: 0, x: -24 },
          { opacity: 1, x: 0, duration: 0.44, stagger: 0.12, ease: "power2.out" },
          1.72,
        );
        outroTimeline.fromTo(
          ".outro-registration",
          { opacity: 0, scale: 0.68 },
          { opacity: 0.62, scale: 1, duration: 0.36, stagger: 0.1, ease: "power1.out" },
          1.94,
        );
        outroTimeline.fromTo(
          ".outro-wash",
          { x: 0, y: 0, scale: 1 },
          { x: 30, y: 14, scale: 1.03, duration: 4.94, ease: "sine.inOut" },
          1.06,
        );

        window.__timelines["outro"] = outroTimeline;
      </script>
    </template>
  </body>
</html>
