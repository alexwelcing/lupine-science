scenes:
  - id: hook
    start: 0
    duration: 17.179
    narration: A predicted crystal is not a material. A synthesized powder is not a cell. A cell is not a fleet, a filter, a fertilizer plant, or a solar farm. Between a computational screen and a commercial product stands a chain of handoffs — and most predictions never survive it.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Minimal editorial illustration of a vast funnel of glowing predicted crystals at the top narrowing through synthesis, powder coating, cell fabrication, and module integration into a single commercial battery cell, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 201
  - id: bottleneck
    start: 17.179
    duration: 19.936
    narration: Millions of predicted crystals shrink to a few hundred independently synthesized. The conventional answer is a bigger generator. But volume without trust only amplifies the same handoff failure. What is missing is a correction and verification layer that makes predictions trustworthy before they reach the lab.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Minimal editorial illustration of a prediction counter collapsing from millions of crystals down to a small pile of verified synthesized powders, with a visible indigo warning band marking the trust gap, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 202
  - id: cathode-chain
    start: 37.115
    duration: 20.641
    narration: Consider cobalt-free lithium-manganese-rich cathodes. A corrected ranking sifts more than a million compositions, then passes the best candidates through synthesis, atomic-layer coating, pouch-cell fabrication, and finally into an automaker's prismatic cell line. Each handoff carries a bounded error budget, or it breaks.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Clean editorial diagram of a partner chain for cobalt-free lithium-manganese-rich cathodes: composition ranking, synthesis, atomic-layer coating, pouch-cell fabrication, and prismatic cell assembly, five linked stations passing one glowing candidate forward, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 203
  - id: correction
    start: 57.756
    duration: 20.641
    narration: The correction measures error as a field over local coordination, anchored to measured observables and pinned to zero in bulk. Analytic forces apply it at runtime, so simulations stay fast. Across 36 blind model-material pairs, corrected surface energies correlate at zero point nine zero six, with zero fitted parameters.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Minimal scientific illustration of a smooth coordination-error field curve anchored by three amber knots and pinned to zero at bulk coordination, with a pipeline flowing from machine-learning potential through correction to analytic forces, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 204
  - id: verification
    start: 78.397
    duration: 20.384
    narration: The verification layer separates supported predictions from unsupported ones with machine-checked proofs. It can flag impossibility, not just uncertainty, before synthesis starts. Experimental budgets are finite; false positives are expensive. The layer makes sure the work goes to candidates that actually deserve it.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Editorial illustration of a machine-check ribbon stamping claims as supported, bounded, or unsupported, with a rejected metastable framework exiting a synthesis queue before any lab work begins, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 205
  - id: thesis
    start: 98.781
    duration: 20.834
    narration: The same logic reaches solid-state electrolytes, direct-air-capture frameworks, ammonia catalysts, and lead-free perovskites. Different markets, different partners, same geometry of wrongness. In every chain, the scarce resource is not prediction volume. It is the trust that turns a predicted crystal into a commercial cell.
    visual:
      type: image
      endpoint: fal-ai/flux/dev
      prompt: |
        Minimal editorial illustration of four climate material domains — solid-state battery, carbon-capture framework, ammonia catalyst, and lead-free perovskite — converging on a central trust bridge from a predicted crystal to a commercial cell, warm cream paper background #faf9f6, indigo accent lines #3d4db3, clean vector style, no text, 16:9
      size: landscape_16_9
      seed: 206
