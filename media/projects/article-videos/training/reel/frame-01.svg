="1.0">proof, not decoration.</text><rect x="1250" y="700" width="450" height="20" rx="10" fill="#6b7c8e" opacity=".24"/><rect x="1250" y="700" width="378" height="20" rx="10" fill="#3d4db3"/><text x="1250" y="766" font-family="IBM Plex Mono" font-size="30" font-weight="400" fill="#6b7c8e" text-anchor="start" letter-spacing="2" opacity="1.0">SYNTHETIC TRAINING METRIC</text>
