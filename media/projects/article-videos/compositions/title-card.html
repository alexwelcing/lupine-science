<!doctype html>
<html
  lang="en"
  data-composition-variables='[
    {"id":"episode","type":"string","label":"Episode label","default":"ARTICLE VIDEO · FIELD NOTE","maxLength":44},
    {"id":"title","type":"string","label":"Episode title","default":"The 0.2% Synthesis Problem","maxLength":88},
    {"id":"deck","type":"string","label":"Deck","default":"Why most AI-predicted materials never reach a lab","maxLength":52},
    {"id":"section","type":"string","label":"Article section","default":"MATERIALS VALIDATION","maxLength":28},
    {"id":"publicationDate","type":"string","label":"Publication date","default":"2026-07-09","maxLength":10},
    {"id":"evidenceCount","type":"string","label":"Evidence count","default":"11 SOURCES","maxLength":16},
    {"id":"proofId","type":"string","label":"Proof-pack ID or article slug","default":"PP · SYNTHESIS-02","maxLength":18}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <title>Lupine Science title card</title>
  </head>
  <body>
    <template>
      <style>
        @font-face {
          font-family: "Newsreader";
          src: url("/assets/brand/newsreader-var.woff2") format("woff2");
          font-style: normal;
          font-weight: 300 700;
          font-display: block;
        }

        @font-face {
          font-family: "Newsreader";
          src: url("/assets/brand/newsreader-italic-var.woff2") format("woff2");
          font-style: italic;
          font-weight: 300 700;
          font-display: block;
        }

        @font-face {
          font-family: "IBM Plex Mono";
          src: url("/assets/brand/plex-mono-400.woff2") format("woff2");
          font-style: normal;
          font-weight: 400;
          font-display: block;
        }

        @font-face {
          font-family: "IBM Plex Mono";
          src: url("/assets/brand/plex-mono-600.woff2") format("woff2");
          font-style: normal;
          font-weight: 600;
          font-display: block;
        }

        #root {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          overflow: hidden;
          color: #1a1a1a;
          font-family: "Newsreader", serif;
        }

        * {
          box-sizing: border-box;
        }

        .clip {
          position: absolute;
          inset: 0;
          width: 100%;
          height: 100%;
          overflow: hidden;
        }

        .title-card-ground {
          position: absolute;
          inset: 0;
          background-color: #faf9f6;
        }

        .title-card-wash {
          position: absolute;
          left: -210px;
          top: -190px;
          width: 980px;
          height: 980px;
          border-radius: 50%;
          background: radial-gradient(circle, rgba(61, 77, 179, 0.2) 0%, rgba(61, 77, 179, 0) 68%);
          transform-origin: center;
        }

        .title-card-grid {
          position: absolute;
          inset: 0;
          opacity: 0.16;
          background-image:
            linear-gradient(rgba(61, 77, 179, 0.18) 2px, transparent 2px),
            linear-gradient(90deg, rgba(61, 77, 179, 0.18) 2px, transparent 2px);
          background-size: 120px 120px;
          mask-image: linear-gradient(90deg, #1a1a1a 0%, transparent 76%);
        }

        .title-card-brand {
          position: absolute;
          left: 120px;
          top: 84px;
          display: flex;
          align-items: center;
          gap: 24px;
          height: 72px;
        }

        .title-card-mark {
          display: block;
          width: 72px;
          height: 72px;
          object-fit: contain;
        }

        .title-card-wordmark {
          font-size: 38px;
          font-weight: 500;
          line-height: 1;
          letter-spacing: -0.015em;
        }

        .title-card-episode {
          position: absolute;
          right: 120px;
          top: 103px;
          margin: 0;
          color: #3d4db3;
          font-family: "IBM Plex Mono", monospace;
          font-size: 36px;
          font-weight: 600;
          line-height: 1.2;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          white-space: nowrap;
        }

        .title-card-heading-wrap {
          position: absolute;
          left: 590px;
          top: 260px;
          width: 1130px;
          height: 420px;
          overflow: visible;
          display: flex;
          align-items: center;
        }

        .title-card-heading {
          display: block;
          margin: 0;
          width: 100%;
          max-width: 1130px;
          color: #1a1a1a;
          font-size: 126px;
          font-weight: 400;
          line-height: 0.98;
          letter-spacing: -0.025em;
          text-wrap: balance;
        }

        .title-card-heading[data-copy-tier="headline"] {
          font-size: 112px;
          line-height: 0.98;
        }

        .title-card-heading[data-copy-tier="subheadline"] {
          font-size: 72px;
          line-height: 1.08;
          letter-spacing: -0.015em;
        }

        .title-card-lower-third {
          position: absolute;
          left: 590px;
          top: 738px;
          width: 1130px;
          height: 90px;
          padding-top: 20px;
          overflow: hidden;
        }

        .title-card-deck {
          margin: 0;
          max-width: 1080px;
          color: #1a1a1a;
          font-size: 58px;
          font-weight: 400;
          line-height: 1.18;
          letter-spacing: -0.015em;
          white-space: nowrap;
        }

        .title-card-deck[data-copy-tier="body"] {
          font-size: 48px;
          line-height: 1.3;
        }

        .title-card-index {
          position: absolute;
          left: 120px;
          top: 470px;
          width: 430px;
          margin: 0;
          color: #3d4db3;
          font-family: "IBM Plex Mono", monospace;
          font-size: 36px;
          font-weight: 400;
          line-height: 1.2;
          letter-spacing: 0.02em;
          font-variant-numeric: tabular-nums;
        }

        .title-card-index strong {
          display: block;
          margin-bottom: 12px;
          font-weight: 600;
          letter-spacing: 0.12em;
        }

        .title-card-index span {
          display: block;
          white-space: nowrap;
        }

        .title-card-trace {
          position: absolute;
          inset: 0;
          width: 1920px;
          height: 1080px;
          pointer-events: none;
        }

        .title-card-trace path,
        .title-card-trace line {
          fill: none;
          stroke: #3d4db3;
          stroke-width: 2;
          vector-effect: non-scaling-stroke;
        }

        .title-card-trace .title-card-trace-emphasis {
          stroke-width: 4;
        }

        .title-card-reg {
          position: absolute;
          width: 30px;
          height: 30px;
          opacity: 0.62;
        }

        .title-card-reg::before,
        .title-card-reg::after {
          content: "";
          position: absolute;
          background-color: #3d4db3;
        }

        .title-card-reg::before {
          left: 14px;
          top: 0;
          width: 2px;
          height: 30px;
        }

        .title-card-reg::after {
          left: 0;
          top: 14px;
          width: 30px;
          height: 2px;
        }

        .title-card-reg-a {
          left: 105px;
          top: 425px;
        }

        .title-card-reg-b {
          right: 105px;
          bottom: 69px;
        }
      </style>

      <div id="root" data-composition-id="title-card" data-width="1920" data-height="1080" data-duration="6" data-fps="30">
        <section id="title-card-scene" class="clip" data-start="0" data-duration="6" data-track-index="0">
          <div class="title-card-ground"></div>
          <div class="title-card-wash" data-layout-ignore></div>
          <div class="title-card-grid" data-layout-ignore></div>

          <svg class="title-card-trace" viewBox="0 0 1920 1080" aria-hidden="true" data-layout-ignore>
            <path id="title-card-trace-main" class="title-card-trace-emphasis" d="M120 738 H560 V214" />
            <path id="title-card-trace-deck" d="M560 738 H1720" />
            <line id="title-card-trace-top" x1="560" y1="214" x2="1720" y2="214" />
            <line id="title-card-trace-tick-a" x1="540" y1="320" x2="580" y2="320" />
            <line id="title-card-trace-tick-b" x1="540" y1="540" x2="580" y2="540" />
          </svg>

          <div id="title-card-brand" class="title-card-brand">
            <img class="title-card-mark" src="assets/brand/lupine-science-mark.svg" alt="Lupine Science" />
            <span class="title-card-wordmark">Lupine Science</span>
          </div>

          <p id="title-card-episode" class="title-card-episode" data-var-text="episode">ARTICLE VIDEO · FIELD NOTE</p>

          <div class="title-card-heading-wrap" data-layout-allow-overflow>
            <h1 id="title-card-heading" class="title-card-heading" data-var-text="title">The 0.2% Synthesis Problem</h1>
          </div>

          <div class="title-card-lower-third">
            <p id="title-card-deck" class="title-card-deck" data-var-text="deck">Why most AI-predicted materials never reach a lab</p>
          </div>

          <p id="title-card-index" class="title-card-index">
            <strong data-var-text="section">MATERIALS VALIDATION</strong>
            <span data-var-text="publicationDate">2026-07-09</span>
            <span data-var-text="evidenceCount">11 SOURCES</span>
            <span data-var-text="proofId">PP · SYNTHESIS-02</span>
          </p>

          <span class="title-card-reg title-card-reg-a" data-layout-ignore></span>
          <span class="title-card-reg title-card-reg-b" data-layout-ignore></span>
        </section>
      </div>

      <script>
        window.__timelines = window.__timelines || {};

        const copyLimits = {
          episode: 44,
          title: 88,
          deck: 52,
          section: 28,
          publicationDate: 10,
          evidenceCount: 16,
          proofId: 18,
        };

        // Sub-composition scripts execute before HyperFrames applies data-var-text.
        // Apply host values synchronously so fit validation runs before sampling.
        const variableHost = document.querySelector("#root").closest("[data-variable-values]");
        if (variableHost) {
          const variableValues = JSON.parse(variableHost.getAttribute("data-variable-values") || "{}");
          Object.entries(variableValues).forEach(([id, value]) => {
            const target = document.querySelector('[data-var-text="' + id + '"]');
            if (target && typeof value === "string") target.textContent = value;
          });
        }

        const readCopy = (selector, field) => {
          const element = document.querySelector(selector);
          const value = element.textContent.trim();
          const length = Array.from(value).length;
          if (!value) {
            throw new Error(`[title-card] ${field} must not be empty.`);
          }
          if (length > copyLimits[field]) {
            throw new Error(
              `[title-card] ${field} is ${length} characters; the tested maximum is ${copyLimits[field]}.`,
            );
          }
          return { element, length };
        };

        const episodeCopy = readCopy("#title-card-episode", "episode");
        const titleCopy = readCopy("#title-card-heading", "title");
        const deckCopy = readCopy("#title-card-deck", "deck");
        readCopy("#title-card-index strong", "section");
        readCopy('#title-card-index span[data-var-text="publicationDate"]', "publicationDate");
        readCopy('#title-card-index span[data-var-text="evidenceCount"]', "evidenceCount");
        readCopy('#title-card-index span[data-var-text="proofId"]', "proofId");

        titleCopy.element.dataset.copyTier =
          titleCopy.length <= 38 ? "display" : titleCopy.length <= 64 ? "headline" : "subheadline";
        deckCopy.element.dataset.copyTier = "body";

        const validateCopyLayout = () => {
          const titleWrap = document.querySelector(".title-card-heading-wrap");
          const lowerThird = document.querySelector(".title-card-lower-third");
          const provenance = document.querySelector("#title-card-index");
          const captionZoneTop = 828;
          const tolerance = 1;

          if (
            titleCopy.element.scrollHeight > titleWrap.clientHeight + tolerance ||
            titleCopy.element.scrollWidth > titleWrap.clientWidth + tolerance
          ) {
            throw new Error(
              `[title-card] title does not fit the ${titleCopy.element.dataset.copyTier} tier ` +
                `(content ${titleCopy.element.scrollWidth}×${titleCopy.element.scrollHeight}px, ` +
                `box ${titleWrap.clientWidth}×${titleWrap.clientHeight}px); shorten or rewrite it.`,
            );
          }
          if (
            deckCopy.element.scrollWidth > lowerThird.clientWidth + tolerance
          ) {
            throw new Error(
              `[title-card] deck does not fit its one-line ${deckCopy.element.dataset.copyTier} tier ` +
                `(content ${deckCopy.element.scrollWidth}px, box ${lowerThird.clientWidth}px); shorten or rewrite it.`,
            );
          }
          const deckBottom = lowerThird.offsetTop + deckCopy.element.offsetTop + deckCopy.element.scrollHeight;
          if (deckBottom > captionZoneTop + tolerance) {
            throw new Error("[title-card] deck collides with the reserved caption zone at y=828.");
          }
          const provenanceSpans = provenance.querySelectorAll("span");
          provenanceSpans.forEach((span) => {
            if (span.scrollWidth > provenance.clientWidth + tolerance) {
              throw new Error("[title-card] provenance value does not fit its approved evidence column.");
            }
          });
          if (provenance.offsetTop + provenance.scrollHeight > 730) {
            throw new Error("[title-card] provenance collides with the evidence rule at y=738.");
          }
        };

        validateCopyLayout();
        document.fonts.ready.then(validateCopyLayout);

        const traceParts = document.querySelectorAll(".title-card-trace path, .title-card-trace line");
        traceParts.forEach((part) => {
          const length = part.getTotalLength();
          part.style.strokeDasharray = `${length}`;
          part.style.strokeDashoffset = `${length}`;
        });

        const tl = gsap.timeline({ paused: true });

        tl.fromTo(
          ".title-card-wash",
          { opacity: 0, scale: 0.9 },
          { opacity: 1, scale: 1, duration: 1.2, ease: "sine.out" },
          0.12,
        );
        tl.fromTo(
          ".title-card-wash",
          { x: 0, y: 0, scale: 1 },
          { x: 48, y: 18, scale: 1.035, duration: 4.68, ease: "sine.inOut" },
          1.32,
        );
        tl.fromTo(
          ".title-card-grid",
          { opacity: 0 },
          { opacity: 0.16, duration: 0.9, ease: "power1.out" },
          0.18,
        );
        tl.to(
          "#title-card-trace-main",
          { strokeDashoffset: 0, duration: 0.72, ease: "power2.inOut" },
          0.18,
        );
        tl.to(
          "#title-card-trace-deck",
          { strokeDashoffset: 0, duration: 0.58, ease: "power2.out" },
          0.54,
        );
        tl.to(
          "#title-card-trace-top",
          { strokeDashoffset: 0, duration: 0.48, ease: "power1.inOut" },
          0.7,
        );
        tl.to(
          ["#title-card-trace-tick-a", "#title-card-trace-tick-b"],
          { strokeDashoffset: 0, duration: 0.28, stagger: 0.1, ease: "none" },
          0.82,
        );
        tl.fromTo(
          "#title-card-brand",
          { opacity: 0, x: -28, scale: 0.94 },
          { opacity: 1, x: 0, scale: 1, duration: 0.62, ease: "expo.out" },
          0.32,
        );
        tl.fromTo(
          "#title-card-episode",
          { opacity: 0, x: 34 },
          { opacity: 1, x: 0, duration: 0.46, ease: "power3.out" },
          0.48,
        );
        tl.fromTo(
          "#title-card-heading",
          { opacity: 0, y: 138 },
          { opacity: 1, y: 0, duration: 0.84, ease: "expo.out" },
          0.68,
        );
        tl.fromTo(
          "#title-card-deck",
          { opacity: 0, x: 42 },
          { opacity: 1, x: 0, duration: 0.56, ease: "power3.out" },
          1.02,
        );
        tl.fromTo(
          "#title-card-index",
          { opacity: 0, y: 22 },
          { opacity: 1, y: 0, duration: 0.42, ease: "power2.out" },
          1.12,
        );
        tl.fromTo(
          ".title-card-reg",
          { opacity: 0, scale: 0.72 },
          { opacity: 0.62, scale: 1, duration: 0.38, stagger: 0.12, ease: "back.out(1.35)" },
          1.26,
        );

        window.__timelines["title-card"] = tl;
      </script>
    </template>
  </body>
</html>
