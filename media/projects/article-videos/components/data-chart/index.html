<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Data chart QA — bar</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>html,body{margin:0;width:100%;height:100%;overflow:hidden}#data-chart-qa{position:relative;width:1920px;height:1080px;overflow:hidden}</style>
  </head>
  <body>
    <div id="data-chart-qa" data-composition-id="data-chart-qa-bar" data-start="0" data-width="1920" data-height="1080" data-duration="6" data-fps="30">
      <div id="data-chart-bar-host" data-composition-id="data-chart" data-composition-src="compositions/data-chart.html" data-start="0" data-duration="6" data-track-index="1" data-width="1920" data-height="1080" data-layout-allow-overflow></div>
    </div>
    <script>window.__timelines=window.__timelines||{};window.__timelines["data-chart-qa-bar"]=gsap.timeline({paused:true});</script>
  </body>
</html>
