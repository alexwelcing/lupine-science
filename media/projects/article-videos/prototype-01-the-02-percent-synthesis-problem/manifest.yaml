scenes:
  - id: scene-01
    start: 0
    duration: 12.210300587306419
    narration: Okay, so AI predicted three hundred eighty thousand stable new materials. Huge, right? But by late 2023, only seven hundred thirty-six had actually been synthesized.
    visual:
      type: image
      prompt: local article image asset
  - id: scene-02
    start: 12.210300587306419
    duration: 11.629947083403282
    narration: That’s zero point two percent. And no, this isn’t just labs moving slowly. A crystal can look perfect on a computer and still have no practical chemical path into existence.
    visual:
      type: image
      prompt: local article image asset
  - id: scene-03
    start: 23.8402476707097
    duration: 11.709414575638977
    narration: 'Prediction is scaling. Synthesizability isn’t. Most screens skip four brutal filters. One: can real precursors reach the target instead of some competing phase?'
    visual:
      type: image
      prompt: local article image asset
  - id: scene-04
    start: 35.549662246348674
    duration: 11.487868839709153
    narration: 'Two: are the forces accurate away from a tidy, equilibrium crystal? Three: what happens when the material has vacancies, disorder, or stacking faults—like real materials do?'
    visual:
      type: image
      prompt: local article image asset
  - id: scene-05
    start: 47.037531086057825
    duration: 16.927779899116544
    narration: 'And four: what does failure cost? Usually weeks of lab time and thousands of dollars. This is not a tiny accuracy problem. Miss an ion-migration barrier by one hundred milli-electronvolts, and the predicted hopping rate changes about fifty-fold at room temperature.'
    visual:
      type: image
      prompt: local article image asset
  - id: scene-06
    start: 63.96531098517437
    duration: 15.31073683741135
    narration: 'You can literally call a conductor an insulator. The answer isn’t a bigger generator. It’s a correction and verification layer: an environment error field that measures where universal potentials go wrong, then corrects them at runtime with proper forces.'
    visual:
      type: image
      prompt: local article image asset
  - id: scene-07
    start: 79.27604782258572
    duration: 11.880390089236988
    narration: Better candidates rise. Bad ones get flagged before the furnace turns on. That matters because batteries are tied directly to roughly twenty percent of the emissions cuts needed by 2030.
    visual:
      type: image
      prompt: local article image asset
  - id: scene-08
    start: 91.1564379118227
    duration: 12.030896703319769
    narration: 'Cobalt-free cathodes could also break a supply chokepoint: about seventy percent of cobalt comes from the Democratic Republic of Congo. And every decade of delay locks in emissions we cannot recover later.'
    visual:
      type: image
      prompt: local article image asset
  - id: scene-09
    start: 103.18733461514248
    duration: 11.568540384857528
    narration: 'The goal is simple: predictions that flow to synthesis, characterization, and scale—not another generation cycle. Read the full article to see how the zero-point-two-percent gap closes.'
    visual:
      type: image
      prompt: local article image asset
