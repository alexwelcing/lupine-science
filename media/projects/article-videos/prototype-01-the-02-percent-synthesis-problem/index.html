<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>The 0.2% Synthesis Problem</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      :root {
        --paper: #faf9f6;
        --ink: #1e1f24;
        --indigo: #3d4db3;
        --indigo-light: #e8eaf7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, "Helvetica Neue", Arial, system-ui, sans-serif;
      }

      #root {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: var(--paper);
      }

      .clip {
        position: absolute;
        inset: 0;
      }

      /* Title card */
      #title-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 80px;
        z-index: 10;
      }

      #title-card .accent-line {
        width: 120px;
        height: 6px;
        background: var(--indigo);
        border-radius: 3px;
        margin-bottom: 40px;
      }

      #title-card h1 {
        margin: 0 0 24px 0;
        font-size: 112px;
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -0.02em;
        color: var(--ink);
        max-width: 1600px;
      }

      #title-card p {
        margin: 0;
        font-size: 42px;
        font-weight: 400;
        line-height: 1.35;
        color: var(--indigo);
        max-width: 1200px;
      }

      /* Visual clips */
      .visual-clip {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 60px 80px 120px 80px;
        z-index: 5;
      }

      .visual-inner {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      .visual-inner img {
        max-width: 1680px;
        max-height: 880px;
        width: auto;
        height: auto;
        object-fit: contain;
        border-radius: 12px;
        box-shadow: 0 24px 64px rgba(30, 31, 36, 0.12);
      }

      .visual-inner figcaption {
        position: absolute;
        bottom: -88px;
        left: 50%;
        transform: translateX(-50%);
        width: max-content;
        max-width: 1600px;
        text-align: center;
        font-size: 28px;
        font-weight: 500;
        line-height: 1.4;
        color: var(--ink);
        background: rgba(250, 249, 246, 0.92);
        padding: 16px 32px;
        border-radius: 8px;
        border-left: 5px solid var(--indigo);
      }

      /* Scene number / kicker */
      .kicker {
        position: absolute;
        top: 36px;
        left: 80px;
        font-size: 18px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--indigo);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="main"
      data-width="1920"
      data-height="1080"
      data-duration="124"
      data-fps="30"
      data-start="0"
    >
      <!-- Title card -->
      <section
        id="title-card"
        class="clip"
        data-start="0"
        data-duration="4"
        data-track-index="2"
      >
        <div class="accent-line"></div>
        <h1>The 0.2% Synthesis Problem</h1>
        <p>Why most AI-predicted materials never reach a lab</p>
      </section>

      <!-- Visual 01: 0.2% Synthesis Funnel -->
      <section
        id="clip-01"
        class="clip visual-clip"
        data-start="0"
        data-duration="9"
        data-track-index="1"
      >
        <div class="visual-inner">
          <div class="kicker">The gap</div>
          <img
            id="img-01"
            src="images/the-02-percent-synthesis-problem-01-synthesis-funnel.jpg"
            alt="The 0.2% Synthesis Funnel"
          />
          <figcaption>
            Of 380,000 computationally stable structures reported by GNoME, only 736 had been independently synthesized by late 2023 — a 0.2% validation rate.
          </figcaption>
        </div>
      </section>

      <!-- Visual 02: Four Filters -->
      <section
        id="clip-02"
        class="clip visual-clip"
        data-start="9"
        data-duration="10"
        data-track-index="1"
      >
        <div class="visual-inner">
          <div class="kicker">Four filters</div>
          <img
            id="img-02"
            src="images/the-02-percent-synthesis-problem-02-four-filters.jpg"
            alt="Four Filters Between Prediction and Synthesis"
          />
          <figcaption>
            Four structural filters separate a predicted crystal from a made material.
          </figcaption>
        </div>
      </section>

      <!-- Visual 03: Universal Potential Softening -->
      <section
        id="clip-03"
        class="clip visual-clip"
        data-start="19"
        data-duration="11"
        data-track-index="1"
      >
        <div class="visual-inner">
          <div class="kicker">Filter 1 &amp; 2</div>
          <img
            id="img-03"
            src="images/the-02-percent-synthesis-problem-03-umlip-softening.jpg"
            alt="Where Universal Potentials Soften"
          />
          <figcaption>
            Universal machine-learning interatomic potentials systematically soften the potential energy surface away from equilibrium.
          </figcaption>
        </div>
      </section>

      <!-- Visual 04: 100 meV Barrier Error -->
      <section
        id="clip-04"
        class="clip visual-clip"
        data-start="30"
        data-duration="8"
        data-track-index="1"
      >
        <div class="visual-inner">
          <div class="kicker">Filter 2</div>
          <img
            id="img-04"
            src="images/the-02-percent-synthesis-problem-04-barrier-error.jpg"
            alt="A 100 meV Barrier Error Changes Everything"
          />
          <figcaption>
            A 100 meV barrier error changes ionic hopping rates by roughly 50× at room temperature — enough to misclassify a conductor as an insulator.
          </figcaption>
        </div>
      </section>

      <!-- Visual 09: Failure Economics (used at 38s) -->
      <section
        id="clip-09"
        class="clip visual-clip"
        data-start="38"
        data-duration="10"
        data-track-index="1"
      >
        <div class="visual-inner">
          <div class="kicker">Filter 3 &amp; 4</div>
          <img
            id="img-09"
            src="images/the-02-percent-synthesis-problem-09-failure-economics.jpg"
            alt="The Economics of a Failed Campaign"
          />
          <figcaption>
            Enforcing the four filters would flag roughly three-quarters of predictions before they reach a furnace.
          </figcaption>
        </div>
      </section>

      <!-- Visual 06: Cobalt & Climate -->
      <section
        id="clip-06"
        class="clip visual-clip"
        data-start="48"
        data-duration="13"
        data-track-index="1"
      >
        <div class="visual-inner">
          <div class="kicker">Beyond the lab</div>
          <img
            id="img-06"
            src="images/the-02-percent-synthesis-problem-06-cobalt-climate.jpg"
            alt="Cobalt Supply and the Net-Zero Abatement Gap"
          />
          <figcaption>
            Cobalt-free cathodes remove a supply-chain chokepoint, while clean-energy investment must more than double this decade.
          </figcaption>
        </div>
      </section>

      <!-- Visual 07: Deployment Window -->
      <section
        id="clip-07"
        class="clip visual-clip"
        data-start="61"
        data-duration="9"
        data-track-index="1"
      >
        <div class="visual-inner">
          <div class="kicker">The window</div>
          <img
            id="img-07"
            src="images/the-02-percent-synthesis-problem-07-deployment-window.jpg"
            alt="The Narrow Deployment Window"
          />
          <figcaption>
            A material discovered too late cannot recover cumulative emissions already locked in.
          </figcaption>
        </div>
      </section>

      <!-- Visual 05: Error Field (used at 70s) -->
      <section
        id="clip-05"
        class="clip visual-clip"
        data-start="70"
        data-duration="10"
        data-track-index="1"
      >
        <div class="visual-inner">
          <div class="kicker">Lupine's approach</div>
          <img
            id="img-05"
            src="images/the-02-percent-synthesis-problem-05-error-field.jpg"
            alt="Learning the Environment Error Field"
          />
          <figcaption>
            Lupine applies a local environment error field at runtime so molecular dynamics follows corrected gradients.
          </figcaption>
        </div>
      </section>

      <!-- Visual 08: Commercial Endpoints -->
      <section
        id="clip-08"
        class="clip visual-clip"
        data-start="80"
        data-duration="8"
        data-track-index="1"
      >
        <div class="visual-inner">
          <div class="kicker">The result</div>
          <img
            id="img-08"
            src="images/the-02-percent-synthesis-problem-08-commercial-endpoints.jpg"
            alt="The Correction Layer Must Feed Real Production"
          />
          <figcaption>
            Corrected screening must feed partners who are already scaling cobalt-free cathodes and solid-state cells.
          </figcaption>
        </div>
      </section>

      <!-- Visual 10: Predictions to Partners -->
      <section
        id="clip-10"
        class="clip visual-clip"
        data-start="88"
        data-duration="36"
        data-track-index="1"
      >
        <div class="visual-inner">
          <div class="kicker">The goal</div>
          <img
            id="img-10"
            src="images/the-02-percent-synthesis-problem-10-predictions-to-partners.jpg"
            alt="From Predictions to Partners"
          />
          <figcaption>
            Corrected predictions must flow into synthesis, characterization, and scale partners — not into another generation cycle.
          </figcaption>
        </div>
      </section>

      <!-- Narration audio -->
      <audio
        id="narration"
        src="audio/narration.wav"
        data-start="0"
        data-duration="123.91"
        data-track-index="20"
        data-volume="1"
      ></audio>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Title card entrance
      tl.from(
        "#title-card",
        { opacity: 0, y: 40, duration: 1.0, ease: "power3.out" },
        0.1
      );
      tl.from(
        "#title-card .accent-line",
        { scaleX: 0, transformOrigin: "left center", duration: 0.7, ease: "power2.out" },
        0.2
      );
      tl.from(
        "#title-card h1",
        { opacity: 0, y: 30, duration: 0.9, ease: "power3.out" },
        0.35
      );
      tl.from(
        "#title-card p",
        { opacity: 0, y: 24, duration: 0.8, ease: "power3.out" },
        0.6
      );

      // Title card exit
      tl.to(
        "#title-card",
        { opacity: 0, y: -20, duration: 0.7, ease: "power2.in" },
        3.0
      );

      // Visual clip entrances
      const visualStarts = [
        { id: "#clip-01", t: 0 },
        { id: "#clip-02", t: 9 },
        { id: "#clip-03", t: 19 },
        { id: "#clip-04", t: 30 },
        { id: "#clip-09", t: 38 },
        { id: "#clip-06", t: 48 },
        { id: "#clip-07", t: 61 },
        { id: "#clip-05", t: 70 },
        { id: "#clip-08", t: 80 },
        { id: "#clip-10", t: 88 },
      ];

      visualStarts.forEach(function (item) {
        tl.from(
          item.id + " .visual-inner",
          { opacity: 0, y: 36, scale: 0.96, duration: 0.8, ease: "power2.out" },
          item.t
        );
        tl.from(
          item.id + " figcaption",
          { opacity: 0, y: 18, duration: 0.6, ease: "power2.out" },
          item.t + 0.25
        );
      });

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
