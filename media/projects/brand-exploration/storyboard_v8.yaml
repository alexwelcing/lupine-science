project: brand-exploration
format: image
version: v8
motifs:
- id: particle-ribbon
  name: Particle ribbon
  base: a wide field of tiny indigo particles drifting and condensing into a single
    luminous diagonal ribbon across warm off-white paper, abstract and calm
- id: ink-wash
  name: Ink wash
  base: layered translucent indigo ink washes on absorbent warm paper, organic feathered
    edges, quiet tonal depth, no recognizable objects
- id: moire-circles
  name: "Moir\xE9 circles"
  base: "a few large overlapping translucent indigo circles on cream paper, creating\
    \ a soft moir\xE9 interference pattern, minimalist and meditative"
- id: constellation-threads
  name: Constellation threads
  base: a sparse constellation of small indigo points connected by hair-thin threads,
    suggesting an invisible geometry on warm paper
- id: shadow-geometry
  name: Shadow geometry
  base: a minimal abstract architectural form casting a long soft indigo shadow across
    a warm paper surface, strong negative space
- id: stroke-dissolution
  name: Stroke dissolution
  base: a single bold indigo brush stroke that dissolves into fine indigo particles
    toward the right, warm off-white paper, elegant motion
- id: folded-light
  name: Folded light
  base: abstract folded paper planes and surfaces catching a soft indigo light, deep
    warm paper shadows, sculptural but not photographic
- id: scale-shards
  name: Scale shards
  base: geometric indigo shards and triangles arranged in a quiet gradient of scale
    from large to small, warm paper background, crisp and premium
variants:
- id: wide
  aspect: '16:9'
  modifier: cinematic wide framing, full-bleed background, detail pushed toward the
    edges
- id: square
  aspect: '1:1'
  modifier: tight centered composition, balanced symmetry, contained negative space
- id: quiet
  aspect: '16:9'
  modifier: extremely sparse, vast empty paper, only a few luminous elements
style_suffix: 'editorial scientific minimalism, warm off-white #faf9f6 paper background,
  single indigo #3d4db3 light and ink, strict two-color palette with subtle tonal
  gradients only within these two colors, no gradients into cyan or purple, solid
  flat colors preferred, generous negative space, calm and premium, abstract, no text,
  no people, no flowers, no neon, no 3D render, no cyan no teal no light blue no purple
  no orange no gold'
scenes:
