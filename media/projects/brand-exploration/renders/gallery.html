<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lupine Science — Brand Exploration Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #faf9f6; --paper-deep: #f2efe7;
      --ink: #16171d; --ink-soft: #4c4e58; --ink-faint: #6e707a;
      --indigo: #3d4db3; --indigo-deep: #2e3a87; --indigo-wash: rgba(61,77,179,0.08);
      --rule: #e2dfd4; --rule-soft: #ece9e0;
      --serif: "Newsreader", Georgia, serif;
      --mono: "IBM Plex Mono", ui-monospace, monospace;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--serif); background: var(--paper); color: var(--ink);
      font-size: 16px; line-height: 1.6;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    body::before {
      content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background: radial-gradient(150% 96% at 50% -14%, rgba(255,254,249,0.75), rgba(255,254,249,0) 52%),
                  radial-gradient(118% 104% at 50% 44%, rgba(26,28,38,0) 58%, rgba(26,28,38,0.05) 100%);
    }
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
      padding: 18px clamp(20px, 5vw, 64px);
      background: rgba(250,249,246,0.86); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--rule-soft);
    }
    .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
    .brand svg { width: 28px; height: 28px; display: block; }
    .brand b { font-weight: 600; font-size: 16px; }
    .brand span { font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.06em; }
    .nav a {
      font-family: var(--mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--ink-soft); text-decoration: none; margin-left: 20px;
    }
    .nav a:hover { color: var(--indigo); }

    main { max-width: 1400px; margin: 0 auto; padding: clamp(40px, 8vh, 80px) clamp(20px, 5vw, 64px); }
    h1 { font-size: clamp(32px, 5vw, 52px); font-weight: 400; letter-spacing: -0.02em; margin-bottom: 8px; }
    h1 em { font-style: italic; color: var(--indigo); }
    .lede { color: var(--ink-soft); font-size: 18px; max-width: 70ch; margin-bottom: 32px; }

    .controls {
      display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 32px;
    }
    .controls button {
      appearance: none; border: 1px solid var(--rule); background: var(--paper-deep);
      font-family: var(--mono); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em;
      padding: 8px 12px; border-radius: 4px; cursor: pointer; color: var(--ink-soft);
      transition: all 180ms var(--ease);
    }
    .controls button:hover, .controls button.active { border-color: var(--indigo); color: var(--indigo); background: var(--indigo-wash); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
    }
    .card {
      background: rgba(255,255,255,0.4); border: 1px solid var(--rule); border-radius: 8px;
      overflow: hidden;
      transition: transform 180ms var(--ease), box-shadow 180ms var(--ease), border-color 180ms var(--ease);
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(22,23,29,0.06); border-color: var(--indigo-line); }
    .card img { display: block; width: 100%; aspect-ratio: 16/9; object-fit: cover; background: var(--paper-deep); }
    .card[data-aspect="1:1"] img { aspect-ratio: 1/1; }
    .card .body { padding: 16px 18px; }
    .card .meta {
      display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
      font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-faint);
    }
    .card .meta .badge { background: var(--indigo-wash); color: var(--indigo-deep); padding: 2px 6px; border-radius: 3px; }
    .card h2 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
    .card p { font-size: 13px; color: var(--ink-soft); line-height: 1.5; margin-bottom: 12px; }
    .card .prompt { font-family: var(--mono); font-size: 11px; color: var(--ink-faint); line-height: 1.45; max-height: 4.4em; overflow: hidden; position: relative; }
    .card .prompt.expanded { max-height: none; }
    .card .prompt-toggle {
      appearance: none; border: none; background: none;
      font-family: var(--mono); font-size: 10px; color: var(--indigo); cursor: pointer; padding: 0; margin-top: 4px;
    }
    .ratings { margin-top: 14px; }
    .rating {
      display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
      font-family: var(--mono); font-size: 11px; color: var(--ink-soft);
    }
    .rating label { min-width: 90px; }
    .rating input[type="range"] { flex: 1; }
    .rating output { min-width: 24px; text-align: right; color: var(--indigo); font-weight: 600; }
    .card textarea {
      width: 100%; margin-top: 10px; padding: 8px; border: 1px solid var(--rule); border-radius: 4px;
      font-family: var(--serif); font-size: 13px; color: var(--ink-soft); background: var(--paper-deep); resize: vertical;
    }

    .summary {
      position: fixed; right: 24px; bottom: 24px; z-index: 101;
      background: var(--paper); border: 1px solid var(--rule); border-radius: 8px;
      padding: 14px 18px; box-shadow: 0 12px 40px rgba(22,23,29,0.1);
      font-family: var(--mono); font-size: 12px; color: var(--ink-soft);
      max-width: 320px;
    }
    .summary strong { color: var(--ink); }
    .summary button {
      appearance: none; border: 0; background: var(--indigo); color: #fff;
      font-family: var(--mono); font-size: 11px; padding: 8px 12px; border-radius: 4px;
      cursor: pointer; margin-top: 10px;
    }
    .summary button:hover { background: var(--indigo-deep); }

    @media (max-width: 720px) {
      .nav { display: none; }
      .grid { grid-template-columns: 1fr; }
      .summary { right: 12px; bottom: 12px; left: 12px; max-width: none; }
    }
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/">
      <svg viewBox="0 0 512 512" fill="none" aria-hidden="true"><g fill="none" stroke="#3d4db3" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"><circle cx="256" cy="256" r="90" opacity="0.25"/><ellipse cx="256" cy="256" rx="90" ry="28" transform="rotate(60 256 256)" opacity="0.35"/><ellipse cx="256" cy="256" rx="90" ry="28" transform="rotate(-60 256 256)" opacity="0.35"/><circle cx="256" cy="256" r="22" fill="#3d4db3" stroke="none"/></g></svg>
      <div><b>Lupine Science</b><br><span>Brand exploration gallery</span></div>
    </a>
    <nav class="nav">
      <a href="../brief.md">Brief</a>
      <a href="../treatment.md">Treatment</a>
      <a href="../storyboard.yaml">Storyboard</a>
    </nav>
  </header>

  <main>
    <h1>Creative direction <em>exploration.</em></h1>
    <p class="lede">A controlled matrix of MiniMax-generated stills across three motifs and four variants. Rate each image; the shortlist drives the next loop.</p>

    <div class="controls" id="filters">
      <button class="active" data-filter="all">All</button>
      <button data-filter="shape-of-wrongness">Shape of wrongness</button>
      <button data-filter="bits-to-atoms">Bits → atoms</button>
      <button data-filter="upstream-cascade">Upstream cascade</button>
      <button data-filter="shortlist">Shortlist</button>
    </div>

    <div class="grid" id="gallery"><!-- cards injected by JS --></div>
  </main>

  <div class="summary" id="summary">
    <strong>Scores saved locally.</strong><br>
    <span id="count">0</span> rated · <span id="short">0</span> shortlisted
    <br><button id="export">Copy shortlist JSON</button>
  </div>

  <script>
    // Generated by build_gallery.py from storyboard.yaml
    const SCENES = [
  {
    "filename": "assets/images/bits-to-atoms.jpg",
    "motif_id": "bits-to-atoms",
    "motif_name": "Bits to atoms",
    "variant_id": "wide",
    "aspect": "16:9",
    "prompt": "the crossing from the digital to the physical: a field of tiny pixels dissolving on the left and re-forming into a precise crystalline atomic lattice on the right"
  },
  {
    "filename": "assets/images/bridge.jpg",
    "motif_id": "the-bridge",
    "motif_name": "The bridge",
    "variant_id": "wide",
    "aspect": "16:9",
    "prompt": "atoms to bits to atoms: a single luminous indigo arc bridging a crystalline lattice to a field of digital glyphs and back to a lattice"
  },
  {
    "filename": "assets/images/cover-shape-of-wrongness.jpg",
    "motif_id": "shape-of-wrongness",
    "motif_name": "Shape of wrongness",
    "variant_id": "wide",
    "aspect": "16:9",
    "prompt": "faint scattered directional error vectors across a warm paper field gracefully collapsing and aligning onto a single luminous indigo ribbon \u2014 a low-dimensional manifold emerging from chaos"
  },
  {
    "filename": "assets/images/hyper-ribbon.jpg",
    "motif_id": "shape-of-wrongness",
    "motif_name": "Shape of wrongness",
    "variant_id": "dense",
    "aspect": "16:9",
    "prompt": "the hyper-ribbon: a single elegant low-dimensional luminous indigo ribbon sheet folded in space with faint error points converging onto its surface"
  },
  {
    "filename": "assets/images/slide01-cover-shape-of-wrongness-101.jpg",
    "motif_id": "shape-of-wrongness",
    "motif_name": "Shape of wrongness",
    "variant_id": "square",
    "aspect": "16:9",
    "prompt": "many faint thin indigo directional line segments at varied angles scattered across the periphery aligning onto one smooth luminous indigo ribbon curve"
  },
  {
    "filename": "assets/images/slide01-cover-shape-of-wrongness-202.jpg",
    "motif_id": "shape-of-wrongness",
    "motif_name": "Shape of wrongness",
    "variant_id": "quiet",
    "aspect": "16:9",
    "prompt": "an elegant abstract scientific figure: many faint directional line segments aligning onto a single smooth luminous indigo ribbon curve; structure emerging from a scattered field"
  },
  {
    "filename": "assets/images/slide02-bits-to-atoms-101.jpg",
    "motif_id": "bits-to-atoms",
    "motif_name": "Bits to atoms",
    "variant_id": "square",
    "aspect": "16:9",
    "prompt": "a field of tiny digital glyphs and pixels on the left dissolving and re-forming into a precise crystalline atomic lattice on the right"
  },
  {
    "filename": "assets/images/slide02-bits-to-atoms-202.jpg",
    "motif_id": "bits-to-atoms",
    "motif_name": "Bits to atoms",
    "variant_id": "quiet",
    "aspect": "16:9",
    "prompt": "the crossing from the digital to the physical; left: pixels and glyphs dissolving, right: crystalline atomic lattice, indigo light"
  },
  {
    "filename": "assets/images/slide04-hyper-ribbon-101.jpg",
    "motif_id": "unknown",
    "motif_name": "Unknown",
    "variant_id": "asset",
    "aspect": "16:9",
    "prompt": ""
  },
  {
    "filename": "assets/images/slide04-hyper-ribbon-202.jpg",
    "motif_id": "unknown",
    "motif_name": "Unknown",
    "variant_id": "asset",
    "aspect": "16:9",
    "prompt": ""
  },
  {
    "filename": "assets/images/slide06-bridge-101.jpg",
    "motif_id": "the-bridge",
    "motif_name": "The bridge",
    "variant_id": "square",
    "aspect": "16:9",
    "prompt": "a single luminous indigo arc bridging a crystalline lattice to a field of digital glyphs and back to a lattice"
  },
  {
    "filename": "assets/images/slide06-bridge-202.jpg",
    "motif_id": "the-bridge",
    "motif_name": "The bridge",
    "variant_id": "quiet",
    "aspect": "16:9",
    "prompt": "atoms to bits to atoms rendered as a luminous indigo bridge across warm paper"
  },
  {
    "filename": "assets/images/slide07-calibration-grid-101.jpg",
    "motif_id": "calibration-grid",
    "motif_name": "Calibration grid",
    "variant_id": "square",
    "aspect": "16:9",
    "prompt": "a clean indigo grid gently overlaying and aligning a field of scattered points onto a smooth manifold"
  },
  {
    "filename": "assets/images/slide07-calibration-grid-202.jpg",
    "motif_id": "calibration-grid",
    "motif_name": "Calibration grid",
    "variant_id": "quiet",
    "aspect": "16:9",
    "prompt": "correction made visible: a clean indigo grid overlaying scattered points and aligning them onto a smooth manifold"
  },
  {
    "filename": "assets/images/slide08-flywheel-101.jpg",
    "motif_id": "compounding-flywheel",
    "motif_name": "Compounding flywheel",
    "variant_id": "square",
    "aspect": "16:9",
    "prompt": "an edge that compounds: a crystal lattice growing outward in self-reinforcing spiral geometry, each layer larger"
  },
  {
    "filename": "assets/images/slide08-flywheel-202.jpg",
    "motif_id": "compounding-flywheel",
    "motif_name": "Compounding flywheel",
    "variant_id": "dense",
    "aspect": "16:9",
    "prompt": "a crystalline indigo lattice growing outward in an elegant self-reinforcing spiral, each ring larger than the last"
  },
  {
    "filename": "assets/images/slide10-vision-replicator-arc-101.jpg",
    "motif_id": "vision-replicator-arc",
    "motif_name": "Vision / replicator arc",
    "variant_id": "square",
    "aspect": "16:9",
    "prompt": "matter coalescing out of faint indigo light along a sweeping horizon arc"
  },
  {
    "filename": "assets/images/slide10-vision-replicator-arc-202.jpg",
    "motif_id": "vision-replicator-arc",
    "motif_name": "Vision / replicator arc",
    "variant_id": "quiet",
    "aspect": "16:9",
    "prompt": "faint indigo particles and light along a sweeping horizon arc assembling into ordered crystalline structure"
  },
  {
    "filename": "assets/images/vision-replicator-arc.jpg",
    "motif_id": "vision-replicator-arc",
    "motif_name": "Vision / replicator arc",
    "variant_id": "wide",
    "aspect": "16:9",
    "prompt": "matter coalescing out of faint indigo light along a sweeping horizon arc; expansive, cinematic, restrained"
  }
];

    const gallery = document.getElementById('gallery');
    const filters = document.getElementById('filters');
    const storageKey = 'lupine-brand-exploration-ratings';
    let ratings = JSON.parse(localStorage.getItem(storageKey) || '{}');

    function save() {
      localStorage.setItem(storageKey, JSON.stringify(ratings));
      updateSummary();
    }

    function updateSummary() {
      const rated = Object.keys(ratings).length;
      const short = Object.values(ratings).filter(r => r.shortlist).length;
      document.getElementById('count').textContent = rated;
      document.getElementById('short').textContent = short;
    }

    function render(filter = 'all') {
      gallery.innerHTML = '';
      SCENES.forEach(scene => {
        if (filter !== 'all') {
          if (filter === 'shortlist') { if (!(ratings[scene.filename]?.shortlist)) return; }
          else if (scene.motif_id !== filter) return;
        }
        const r = ratings[scene.filename] || { palette: 3, composition: 3, onbrand: 3, hero: 3, note: '', shortlist: false };
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.motif = scene.motif_id;
        card.dataset.aspect = scene.aspect;
        card.innerHTML = `
          <img src="${scene.filename}" alt="${scene.motif_name} — ${scene.variant_id}" loading="lazy">
          <div class="body">
            <div class="meta"><span class="badge">${scene.motif_name}</span><span>${scene.variant_id}</span><span>${scene.aspect}</span></div>
            <h2>${scene.variant_id}</h2>
            <p>${scene.motif_name}</p>
            <div class="prompt" id="p-${scene.filename.replace(/[^a-z0-9]/gi,'')}">${scene.prompt}</div>
            <button class="prompt-toggle">Show prompt</button>
            <div class="ratings">
              <label class="rating"><span>Palette</span><input type="range" min="1" max="5" value="${r.palette}" data-key="${scene.filename}" data-dim="palette"><output>${r.palette}</output></label>
              <label class="rating"><span>Composition</span><input type="range" min="1" max="5" value="${r.composition}" data-key="${scene.filename}" data-dim="composition"><output>${r.composition}</output></label>
              <label class="rating"><span>On-brand</span><input type="range" min="1" max="5" value="${r.onbrand}" data-key="${scene.filename}" data-dim="onbrand"><output>${r.onbrand}</output></label>
              <label class="rating"><span>Hero usable</span><input type="range" min="1" max="5" value="${r.hero}" data-key="${scene.filename}" data-dim="hero"><output>${r.hero}</output></label>
            </div>
            <label style="display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:11px;color:var(--ink-soft);margin-top:10px;">
              <input type="checkbox" class="shortlist" data-key="${scene.filename}" ${r.shortlist ? 'checked' : ''}> Shortlist
            </label>
            <textarea placeholder="Notes…" data-key="${scene.filename}" data-dim="note">${r.note}</textarea>
          </div>
        `;
        gallery.appendChild(card);
      });

      gallery.querySelectorAll('.prompt-toggle').forEach(btn => {
        btn.addEventListener('click', () => {
          const p = btn.previousElementSibling;
          p.classList.toggle('expanded');
          btn.textContent = p.classList.contains('expanded') ? 'Hide prompt' : 'Show prompt';
        });
      });

      gallery.querySelectorAll('input[type="range"]').forEach(input => {
        input.addEventListener('input', () => {
          const key = input.dataset.key;
          const dim = input.dataset.dim;
          ratings[key] = ratings[key] || { palette: 3, composition: 3, onbrand: 3, hero: 3, note: '', shortlist: false };
          ratings[key][dim] = parseInt(input.value, 10);
          input.nextElementSibling.textContent = input.value;
          save();
        });
      });

      gallery.querySelectorAll('.shortlist').forEach(box => {
        box.addEventListener('change', () => {
          const key = box.dataset.key;
          ratings[key] = ratings[key] || { palette: 3, composition: 3, onbrand: 3, hero: 3, note: '', shortlist: false };
          ratings[key].shortlist = box.checked;
          save();
        });
      });

      gallery.querySelectorAll('textarea').forEach(ta => {
        ta.addEventListener('input', () => {
          const key = ta.dataset.key;
          ratings[key] = ratings[key] || { palette: 3, composition: 3, onbrand: 3, hero: 3, note: '', shortlist: false };
          ratings[key].note = ta.value;
          save();
        });
      });
    }

    filters.addEventListener('click', e => {
      if (e.target.tagName !== 'BUTTON') return;
      filters.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      render(e.target.dataset.filter);
    });

    document.getElementById('export').addEventListener('click', () => {
      const short = SCENES.filter(s => ratings[s.filename]?.shortlist).map(s => ({ ...s, rating: ratings[s.filename] }));
      navigator.clipboard.writeText(JSON.stringify(short, null, 2));
      alert('Shortlist JSON copied to clipboard.');
    });

    updateSummary();
    render();
  </script>
</body>
</html>
