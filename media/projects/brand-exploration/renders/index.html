<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lupine Science — Brand Assets Review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #faf9f6; --paper-deep: #f2efe7;
      --ink: #16171d; --ink-soft: #4c4e58; --ink-faint: #6e707a;
      --indigo: #3d4db3; --indigo-deep: #2e3a87;
      --rule: #e2dfd4; --rule-soft: #ece9e0;
      --serif: "Newsreader", Georgia, serif;
      --mono: "IBM Plex Mono", ui-monospace, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--serif); background: var(--paper); color: var(--ink);
      min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: clamp(32px, 8vw, 80px);
    }
    h1 { font-size: clamp(36px, 6vw, 64px); font-weight: 400; letter-spacing: -0.02em; margin-bottom: 12px; text-align: center; }
    h1 em { font-style: italic; color: var(--indigo); }
    p { color: var(--ink-soft); font-size: 18px; max-width: 60ch; text-align: center; margin-bottom: 48px; }
    .links { display: grid; gap: 18px; width: min(100%, 420px); }
    a {
      display: block; padding: 22px 26px;
      background: rgba(255,255,255,0.6); border: 1px solid var(--rule); border-radius: 8px;
      text-decoration: none; color: var(--ink);
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }
    a:hover { transform: translateY(-2px); box-shadow: 0 14px 34px rgba(22,23,29,0.06); border-color: var(--indigo); }
    a strong { display: block; font-size: 20px; font-weight: 500; margin-bottom: 6px; }
    a span { font-family: var(--mono); font-size: 12px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.04em; }
  </style>
</head>
<body>
  <h1>Brand assets <em>review.</em></h1>
  <p>Pick a gallery below to review the generated image corpus, rate stills, and export your shortlist.</p>
  <nav class="links">
    <a href="http://aledev.taild6f8cb.ts.net:8787/">
      <strong>Asset Library App</strong>
      <span>Search · filter · favorite · rate · download</span>
    </a>
    <a href="/library.html">
      <strong>Static Library</strong>
      <span>All 152 assets · browse everything</span>
    </a>
    <a href="/gallery_all.html">
      <strong>Combined v1–v9 Gallery</strong>
      <span>Filter by version · rate & export</span>
    </a>
  </nav>
</body>
</html>
