project: brand-exploration
format: image
version: v10
motifs:
- id: paper-topography
  name: Paper topography
  base: layered cut-paper ridges forming an abstract topographic map, clean elevation
    contours, flat vector on warm off-white paper
- id: crystalline-form
  name: Crystalline form
  base: a single angular crystal silhouette with one internal facet line, centered,
    flat vector on warm off-white paper
- id: meander-pattern
  name: Meander pattern
  base: a continuous indigo line meandering in a rhythmic back-and-forth path, centered
    flat vector on warm off-white paper
- id: moire-grid
  name: Moire grid
  base: two faint offset grids overlapping to create a soft moire interference pattern,
    centered flat vector on warm off-white paper
- id: ribbon-knot
  name: Ribbon knot
  base: a single indigo ribbon passing through itself to form an abstract knot, centered
    flat vector on warm off-white paper
- id: lattice-defect
  name: Lattice defect
  base: a regular square lattice with one missing node, creating a subtle void, centered
    flat vector on warm off-white paper
- id: radial-array
  name: Radial array
  base: evenly spaced indigo marks radiating from a central hollow ring, centered
    flat vector on warm off-white paper
- id: interference
  name: Interference
  base: two sets of concentric arcs crossing to form an interference fringe pattern,
    centered flat vector on warm off-white paper
- id: wavefront
  name: Wavefront
  base: parallel curved lines of varying spacing suggesting a propagating wavefront,
    centered flat vector on warm off-white paper
- id: phase-transition
  name: Phase transition
  base: a field of small dots transitioning from ordered grid to scattered cloud,
    centered flat vector on warm off-white paper
- id: isosurface
  name: Isosurface
  base: nested closed contours forming an abstract isosurface slice, centered flat
    vector on warm off-white paper
- id: network-graph
  name: Network graph
  base: a sparse graph of nodes connected by straight indigo edges, centered flat
    vector on warm off-white paper
- id: diffraction
  name: Diffraction
  base: fine indigo lines fanning out from a narrow central gap, centered flat vector
    on warm off-white paper
- id: tessellation
  name: Tessellation
  base: a single indigo tile shape repeating in a seamless geometric tessellation,
    centered flat vector on warm off-white paper
- id: shadow-arch
  name: Shadow arch
  base: overlapping indigo arches casting implied shadows, centered flat vector on
    warm off-white paper
- id: field-gradient
  name: Field gradient
  base: evenly spaced parallel lines bending around an invisible form, centered flat
    vector on warm off-white paper
variants:
- id: wide
  aspect: '16:9'
  modifier: wide banner format with the motif centered and generous negative space,
    suitable for headers
- id: square
  aspect: '1:1'
  modifier: square canvas with the motif centered and large, generous padding, ready
    for copy-paste
- id: quiet
  aspect: '16:9'
  modifier: minimal composition with the motif small and off-center, abundant warm
    off-white negative space
style_suffix: 'abstract geometric composition, solid warm off-white #faf9f6 paper
  background, single indigo #3d4db3 ink, flat vector, crisp clean edges, no gradients,
  no shadows, no 3D render, no photography, no text, no letters, no numbers, no people,
  no flowers, no neon, no cyan, no teal, no purple, no orange, no gold, brand imagery
  suitable for print and web'
