<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lupine Brand Asset Library{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #faf9f6; --paper-deep: #f2efe7; --paper-card: rgba(255,255,255,0.7);
      --ink: #16171d; --ink-soft: #4c4e58; --ink-faint: #6e707a;
      --indigo: #3d4db3; --indigo-deep: #2e3a87; --indigo-wash: rgba(61,77,179,0.10);
      --rule: #e2dfd4; --rule-soft: #ece9e0;
      --serif: "Newsreader", Georgia, serif;
      --mono: "IBM Plex Mono", ui-monospace, monospace;
      --shadow: 0 10px 30px rgba(22,23,29,0.06);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--serif); background: var(--paper); color: var(--ink);
      font-size: 16px; line-height: 1.6;
      -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    }
    a { color: var(--indigo); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
      padding: 14px clamp(20px, 5vw, 64px);
      background: rgba(250,249,246,0.92); backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--rule-soft);
    }
    .brand { display: flex; align-items: center; gap: 12px; color: inherit; }
    .brand b { font-weight: 600; font-size: 17px; }
    .brand span { font-family: var(--mono); font-size: 10.5px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.06em; }
    nav a {
      font-family: var(--mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em;
      color: var(--ink-soft); text-decoration: none; margin-left: 20px;
    }
    nav a:hover { color: var(--indigo); }
    main { max-width: 1600px; margin: 0 auto; padding: clamp(32px, 6vh, 64px) clamp(20px, 5vw, 64px); }
    h1 { font-size: clamp(32px, 5vw, 52px); font-weight: 400; letter-spacing: -0.02em; margin-bottom: 8px; }
    h1 em { font-style: italic; color: var(--indigo); }
    .lede { color: var(--ink-soft); font-size: 18px; max-width: 75ch; margin-bottom: 32px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--mono); font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em;
      padding: 10px 16px; border-radius: 6px; border: 1px solid var(--rule); background: var(--paper-card);
      color: var(--ink-soft); cursor: pointer; transition: all 150ms ease;
    }
    .btn:hover { border-color: var(--indigo); color: var(--indigo); background: var(--indigo-wash); }
    .btn.active { background: var(--indigo); border-color: var(--indigo); color: #fff; }
    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>
  <header>
    <a class="brand" href="/">
      <b>Lupine Science</b>
      <span>Brand Asset Library</span>
    </a>
    <nav>
      <a href="/?favorite=1">Favorites</a>
      <a href="/">All</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
