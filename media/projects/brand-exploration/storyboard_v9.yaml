project: brand-exploration
format: image
version: v9
motifs:
- id: orbit-mark
  name: Orbit mark
  base: a minimal atomic icon of a small solid circle with two thin elliptical orbits
    crossing around it, centered on warm off-white paper, flat vector glyph
- id: lattice-node
  name: Lattice node
  base: a small grid of four dots connected by straight lines forming a square lattice
    node, centered, flat vector icon on warm off-white paper
- id: proof-check
  name: Proof check
  base: a bold indigo checkmark inside a thin square frame, centered, flat vector
    icon on warm off-white paper
- id: error-tick
  name: Error tick
  base: a crosshair target with one small tick mark slightly off center, representing
    measured error, centered flat vector icon on warm off-white paper
- id: molecule-glyph
  name: Molecule glyph
  base: a simple abstract molecule made of three small circles connected by two lines,
    centered, flat vector icon on warm off-white paper
- id: bond-angle
  name: Bond angle
  base: two thick indigo lines meeting at an acute angle with a small arc showing
    the angle, centered flat vector icon on warm off-white paper
- id: calibration-cross
  name: Calibration cross
  base: a precise plus sign with small tick marks along each arm like a calibration
    reticle, centered flat vector icon on warm off-white paper
- id: trust-shield
  name: Trust shield
  base: a shield outline containing a small indigo checkmark, centered flat vector
    icon on warm off-white paper
- id: field-line
  name: Field line
  base: a single smooth curved indigo line with a small arrowhead, suggesting a vector
    field, centered flat vector icon on warm off-white paper
- id: manifold-curve
  name: Manifold curve
  base: a continuous indigo ribbon forming a simple loop or lemniscate, centered flat
    vector icon on warm off-white paper
- id: atomic-ring
  name: Atomic ring
  base: three concentric thin indigo rings with a tiny solid center dot, centered
    flat vector icon on warm off-white paper
- id: coordinate-axis
  name: Coordinate axis
  base: three thin axes meeting at the bottom-left corner with small arrowheads, centered
    flat vector icon on warm off-white paper
- id: hex-cell
  name: Hex cell
  base: a single regular hexagon with a small solid indigo dot at its center, centered
    flat vector icon on warm off-white paper
- id: wave-packet
  name: Wave packet
  base: a smooth sine-wave pulse tapering at both ends, centered flat vector icon
    on warm off-white paper
- id: convergence-star
  name: Convergence star
  base: several thin indigo lines converging to a single bright point at the center,
    centered flat vector icon on warm off-white paper
- id: divergence-burst
  name: Divergence burst
  base: several thin indigo lines radiating outward from a small central dot, centered
    flat vector icon on warm off-white paper
variants:
- id: square
  aspect: '1:1'
  modifier: square canvas with the icon centered and large, generous padding, ready
    for copy-paste
- id: circle
  aspect: '1:1'
  modifier: square canvas with the icon enclosed in a faint circular boundary, centered,
    ready for copy-paste
- id: wide
  aspect: '16:9'
  modifier: wide banner format with the icon centered left and negative space right,
    suitable for headers
style_suffix: 'standalone icon design, centered glyph, solid warm off-white #faf9f6
  background, single indigo #3d4db3 ink, flat vector, crisp clean edges, generous
  padding around the icon, no text, no letters, no numbers, no people, no flowers,
  no gradients, no shadows, no 3D render, no photography, no cyan no teal no light
  blue no purple no orange no gold, iconography suitable for copy-paste'
