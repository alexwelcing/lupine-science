project: brand-exploration
format: image
motifs:
- id: shape-of-wrongness
  name: Shape of wrongness
  base: "faint scattered directional error vectors across a warm paper field gracefully\
    \ collapsing and aligning onto a single luminous indigo ribbon \u2014 a low-dimensional\
    \ manifold emerging from chaos"
- id: bits-to-atoms
  name: Bits to atoms
  base: a field of tiny digital glyphs and pixels on the left dissolving and re-forming
    into a precise crystalline atomic lattice on the right; the crossing from the
    digital to the physical
- id: upstream-cascade
  name: Upstream cascade
  base: a single point of indigo light rippling outward through a vast faint lattice
    of interconnected nodes, conveying scale and consequence
variants:
- id: wide
  aspect: '16:9'
  modifier: cinematic wide framing, full-bleed background, detail pushed toward the
    edges
- id: square
  aspect: '1:1'
  modifier: tight centered composition, balanced symmetry, contained negative space
- id: dense
  aspect: '16:9'
  modifier: richer density of elements, more vectors or nodes, stronger texture
- id: quiet
  aspect: '16:9'
  modifier: extremely sparse, vast empty paper, only a few luminous elements
style_suffix: 'editorial scientific minimalism, warm off-white #faf9f6 paper background,

  single indigo #3d4db3 light/accent, near-duotone, generous negative space,

  calm and premium, no text, no people, no flowers, no neon, no glowing circuits,

  like a figure in a beautiful physics monograph, high detail toward the edges

  '
